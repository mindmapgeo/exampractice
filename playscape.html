<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playscape - Interpreter Chats</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0d14;
    --bg2: #111520;
    --card: #1a2035;
    --card-hover: #1f2640;
    --border: #2a3350;
    --accent: #4f8ef7;
    --accent2: #7c5af7;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --doctor: #34d399;
    --interpreter: #a78bfa;
    --patient: #fbbf24;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif;
    height: 100vh; display: flex; flex-direction: column;
    overflow: hidden;
  }

  header {
    background: rgba(10,13,20,0.85);
    border-bottom: 1px solid var(--border);
    padding: 0 24px; display: flex; align-items: center;
    height: 64px; flex-shrink: 0; z-index: 10;
  }
  .logo {
    font-weight: 800; font-size: 18px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }

  .main-container {
    display: flex; flex: 1; overflow: hidden;
  }

  .sidebar {
    width: 320px; background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
  }
  .filters {
    padding: 16px; border-bottom: 1px solid var(--border);
  }
  .filters select {
    width: 100%; padding: 10px; background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; font-family: 'Inter'; outline: none;
  }
  
  .chat-list {
    flex: 1; overflow-y: auto;
  }
  .chat-item {
    padding: 16px; border-bottom: 1px solid var(--border); cursor: pointer;
    transition: background 0.2s;
  }
  .chat-item:hover, .chat-item.active {
    background: var(--card-hover);
  }
  .chat-item-topic {
    font-size: 11px; color: var(--accent); font-weight: 700; text-transform: uppercase;
    margin-bottom: 4px;
  }
  .chat-item-title {
    font-size: 15px; font-weight: 600; color: var(--text);
  }

  .chat-area {
    flex: 1; display: flex; flex-direction: column; background: var(--bg);
    position: relative;
  }
  .chat-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .chat-header h2 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .chat-header p { color: var(--text2); font-size: 14px; }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
  }

  .message {
    max-width: 85%; padding: 16px; border-radius: 12px;
    position: relative; animation: fadeIn 0.3s ease-out;
    display: none; /* hidden until clicked */
  }
  .message.visible { display: block; }
  
  .message.Doctor { align-self: flex-start; background: rgba(52, 211, 153, 0.1); border: 1px solid rgba(52, 211, 153, 0.2); }
  .message.Patient { align-self: flex-start; background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2); margin-left: 20px; }
  .message.Interpreter { align-self: flex-end; background: rgba(167, 139, 250, 0.1); border: 1px solid rgba(167, 139, 250, 0.2); }
  
  .message-role {
    font-size: 12px; font-weight: 700; margin-bottom: 6px; text-transform: uppercase;
  }
  .Doctor .message-role { color: var(--doctor); }
  .Patient .message-role { color: var(--patient); }
  .Interpreter .message-role { color: var(--interpreter); }

  .message-text { font-size: 15px; line-height: 1.5; }

  .controls {
    padding: 16px 24px; border-top: 1px solid var(--border); background: var(--bg2);
    display: flex; justify-content: space-between; align-items: center;
  }
  .btn {
    padding: 12px 24px; border-radius: 8px; border: none; font-weight: 600; font-family: 'Inter';
    cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #3b76d6; }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--card-hover); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .empty-state {
    display: flex; flex: 1; align-items: center; justify-content: center;
    color: var(--text2); font-size: 16px; flex-direction: column; gap: 12px;
  }
</style>
</head>
<body>

<header>
  <div class="logo">PLAYSCAPE // Interactive Chat Training</div>
</header>

<div class="main-container">
  <div class="sidebar">
    <div class="filters">
      <select id="topicFilter">
        <option value="ALL">All Topics</option>
        <option value="ANEMIA">Anemia</option>
        <option value="THYROID">Thyroid</option>
        <option value="SEIZURES">Seizures</option>
        <option value="GENERAL WELLNESS">General Wellness</option>
        <option value="HEART ISSUES">Heart Issues</option>
        <option value="DIABETES">Diabetes</option>
        <option value="PREGNANCY">Pregnancy</option>
      </select>
    </div>
    <div class="chat-list" id="chatList"></div>
  </div>

  <div class="chat-area">
    <div class="chat-header" id="chatHeader" style="display:none;">
      <h2 id="chatTitle"></h2>
      <p id="chatTopic"></p>
    </div>
    
    <div class="chat-messages" id="chatMessages">
      <div class="empty-state">
        <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
        Select a scenario to start practicing
      </div>
    </div>

    <div class="controls" id="chatControls" style="display:none;">
      <button class="btn btn-secondary" id="btnReset">Reset Scenario</button>
      <button class="btn btn-primary" id="btnNext">Reveal Next Line (Space)</button>
    </div>
  </div>
</div>

<script>
  const chats = [{"title": "Fatigue and Dietary Iron Absorption", "topic": "ANEMIA", "messages": [{"role": "Doctor", "text": "Hello Mrs. Kovalenko. Your recent blood work shows that your ferritin levels are quite low, confirming iron-deficiency anemia. This explains your persistent fatigue.", "lang": "en"}, {"role": "Interpreter", "text": "\u0414\u043e\u0431\u0440\u043e\u0433\u043e \u0434\u043d\u044f, \u043f\u0430\u043d\u0456 \u041a\u043e\u0432\u0430\u043b\u0435\u043d\u043a\u043e. \u0412\u0430\u0448\u0456 \u043e\u0441\u0442\u0430\u043d\u043d\u0456 \u0430\u043d\u0430\u043b\u0456\u0437\u0438 \u043a\u0440\u043e\u0432\u0456 \u043f\u043e\u043a\u0430\u0437\u0443\u044e\u0442\u044c, \u0449\u043e \u0440\u0456\u0432\u0435\u043d\u044c \u0444\u0435\u0440\u0438\u0442\u0438\u043d\u0443 \u0443 \u0432\u0430\u0441 \u0434\u043e\u0441\u0438\u0442\u044c \u043d\u0438\u0437\u044c\u043a\u0438\u0439, \u0449\u043e \u043f\u0456\u0434\u0442\u0432\u0435\u0440\u0434\u0436\u0443\u0454 \u0437\u0430\u043b\u0456\u0437\u043e\u0434\u0435\u0444\u0456\u0446\u0438\u0442\u043d\u0443 \u0430\u043d\u0435\u043c\u0456\u044e. \u0426\u0435 \u043f\u043e\u044f\u0441\u043d\u044e\u0454 \u0432\u0430\u0448\u0443 \u043f\u043e\u0441\u0442\u0456\u0439\u043d\u0443 \u0432\u0442\u043e\u043c\u0443.", "lang": "uk"}, {"role": "Patient", "text": "\u042f \u043f\u0440\u0438\u0439\u043c\u0430\u044e \u0442\u0456 \u043f\u0456\u0433\u0443\u043b\u043a\u0438 \u0437 \u0437\u0430\u043b\u0456\u0437\u043e\u043c \u0449\u043e\u0434\u043d\u044f, \u044f\u043a \u0432\u0438 \u043a\u0430\u0437\u0430\u043b\u0438. \u0417\u0430\u043f\u0438\u0432\u0430\u044e \u0457\u0445 \u043c\u0456\u0446\u043d\u0438\u043c \u0447\u043e\u0440\u043d\u0438\u043c \u0447\u0430\u0454\u043c \u0437\u0440\u0430\u043d\u043a\u0443, \u0449\u043e\u0431 \u0448\u0432\u0438\u0434\u0448\u0435 \u043f\u0440\u043e\u043a\u0438\u043d\u0443\u0442\u0438\u0441\u044f.", "lang": "uk"}, {"role": "Interpreter", "text": "I take those iron pills every day as you said. I wash them down with strong black tea in the morning to wake up faster.", "lang": "en"}, {"role": "Doctor", "text": "Ah, that might be the issue. The tannins in black tea actually prevent your body from absorbing the iron. You should take them with orange juice instead, as Vitamin C boosts absorption.", "lang": "en"}, {"role": "Interpreter", "text": "\u0410, \u043c\u043e\u0436\u043b\u0438\u0432\u043e, \u0441\u0430\u043c\u0435 \u0432 \u0446\u044c\u043e\u043c\u0443 \u043f\u0440\u043e\u0431\u043b\u0435\u043c\u0430. \u0422\u0430\u043d\u0456\u043d\u0438, \u0449\u043e \u043c\u0456\u0441\u0442\u044f\u0442\u044c\u0441\u044f \u0432 \u0447\u043e\u0440\u043d\u043e\u043c\u0443 \u0447\u0430\u0457, \u043d\u0430\u0441\u043f\u0440\u0430\u0432\u0434\u0456 \u0437\u0430\u0432\u0430\u0436\u0430\u044e\u0442\u044c \u0432\u0430\u0448\u043e\u043c\u0443 \u043e\u0440\u0433\u0430\u043d\u0456\u0437\u043c\u0443 \u0437\u0430\u0441\u0432\u043e\u044e\u0432\u0430\u0442\u0438 \u0437\u0430\u043b\u0456\u0437\u043e. \u041d\u0430\u0442\u043e\u043c\u0456\u0441\u0442\u044c \u0432\u0430\u043c \u0441\u043b\u0456\u0434 \u043f\u0440\u0438\u0439\u043c\u0430\u0442\u0438 \u0457\u0445 \u0437 \u0430\u043f\u0435\u043b\u044c\u0441\u0438\u043d\u043e\u0432\u0438\u043c \u0441\u043e\u043a\u043e\u043c, \u043e\u0441\u043a\u0456\u043b\u044c\u043a\u0438 \u0432\u0456\u0442\u0430\u043c\u0456\u043d \u0421 \u043f\u043e\u043a\u0440\u0430\u0449\u0443\u0454 \u0437\u0430\u0441\u0432\u043e\u0454\u043d\u043d\u044f.", "lang": "uk"}, {"role": "Patient", "text": "\u041e\u0433\u043e, \u044f \u0446\u044c\u043e\u0433\u043e \u043d\u0435 \u0437\u043d\u0430\u043b\u0430. \u0410 \u044f\u043a\u0449\u043e \u0432 \u043c\u0435\u043d\u0435 \u0432\u0456\u0434 \u0441\u043e\u043a\u0443 \u043f\u0435\u0447\u0456\u044f?", "lang": "uk"}, {"role": "Interpreter", "text": "Wow, I didn't know that. What if the juice gives me heartburn?", "lang": "en"}, {"role": "Doctor", "text": "If orange juice causes acid reflux, you can just take the supplement with a glass of water on an empty stomach, about an hour before eating.", "lang": "en"}, {"role": "Interpreter", "text": "\u042f\u043a\u0449\u043e \u0430\u043f\u0435\u043b\u044c\u0441\u0438\u043d\u043e\u0432\u0438\u0439 \u0441\u0456\u043a \u0432\u0438\u043a\u043b\u0438\u043a\u0430\u0454 \u043a\u0438\u0441\u043b\u043e\u0442\u043d\u0438\u0439 \u0440\u0435\u0444\u043b\u044e\u043a\u0441, \u0432\u0438 \u043c\u043e\u0436\u0435\u0442\u0435 \u043f\u0440\u043e\u0441\u0442\u043e \u043f\u0440\u0438\u0439\u043c\u0430\u0442\u0438 \u0434\u043e\u0431\u0430\u0432\u043a\u0443 \u0437\u0456 \u0441\u043a\u043b\u044f\u043d\u043a\u043e\u044e \u0432\u043e\u0434\u0438 \u043d\u0430\u0442\u0449\u0435\u0441\u0435\u0440\u0446\u0435, \u043f\u0440\u0438\u0431\u043b\u0438\u0437\u043d\u043e \u0437\u0430 \u0433\u043e\u0434\u0438\u043d\u0443 \u0434\u043e \u0457\u0436\u0456.", "lang": "uk"}]}, {"title": "Severe Dizziness and Heavy Cycles", "topic": "ANEMIA", "messages": [{"role": "Doctor", "text": "You mentioned experiencing orthostatic hypotension\u2014that means getting dizzy or lightheaded when you stand up quickly.", "lang": "en"}, {"role": "Interpreter", "text": "\u0412\u0438 \u0437\u0433\u0430\u0434\u0443\u0432\u0430\u043b\u0438, \u0449\u043e \u0432\u0456\u0434\u0447\u0443\u0432\u0430\u0454\u0442\u0435 \u043e\u0440\u0442\u043e\u0441\u0442\u0430\u0442\u0438\u0447\u043d\u0443 \u0433\u0456\u043f\u043e\u0442\u0435\u043d\u0437\u0456\u044e \u2014 \u0446\u0435 \u043e\u0437\u043d\u0430\u0447\u0430\u0454 \u0437\u0430\u043f\u0430\u043c\u043e\u0440\u043e\u0447\u0435\u043d\u043d\u044f \u0430\u0431\u043e \u043f\u043e\u0442\u0435\u043c\u043d\u0456\u043d\u043d\u044f \u0432 \u043e\u0447\u0430\u0445, \u043a\u043e\u043b\u0438 \u0432\u0438 \u0448\u0432\u0438\u0434\u043a\u043e \u0432\u0441\u0442\u0430\u0454\u0442\u0435.", "lang": "uk"}, {"role": "Patient", "text": "\u0422\u0430\u043a, \u0456\u043d\u043e\u0434\u0456 \u044f \u043c\u0443\u0448\u0443 \u0442\u0440\u0438\u043c\u0430\u0442\u0438\u0441\u044f \u0437\u0430 \u0441\u0442\u0456\u043d\u0443, \u0449\u043e\u0431 \u043d\u0435 \u0432\u043f\u0430\u0441\u0442\u0438. \u0426\u0435 \u0434\u0443\u0436\u0435 \u043b\u044f\u043a\u0430\u0454.", "lang": "uk"}, {"role": "Interpreter", "text": "Yes, sometimes I have to hold onto the wall so I don't fall. It's very scary.", "lang": "en"}, {"role": "Doctor", "text": "Given your extremely low hemoglobin count of 8.5, this is expected. I need to ask, have your menstrual cycles been unusually heavy recently?", "lang": "en"}, {"role": "Interpreter", "text": "\u0417 \u043e\u0433\u043b\u044f\u0434\u0443 \u043d\u0430 \u0432\u0430\u0448 \u0432\u043a\u0440\u0430\u0439 \u043d\u0438\u0437\u044c\u043a\u0438\u0439 \u0440\u0456\u0432\u0435\u043d\u044c \u0433\u0435\u043c\u043e\u0433\u043b\u043e\u0431\u0456\u043d\u0443 \u2014 8,5, \u0446\u0435 \u043e\u0447\u0456\u043a\u0443\u0432\u0430\u043d\u043e. \u041c\u0443\u0448\u0443 \u0437\u0430\u043f\u0438\u0442\u0430\u0442\u0438, \u0447\u0438 \u0431\u0443\u043b\u0438 \u0432\u0430\u0448\u0456 \u043c\u0435\u043d\u0441\u0442\u0440\u0443\u0430\u043b\u044c\u043d\u0456 \u0446\u0438\u043a\u043b\u0438 \u043e\u0441\u0442\u0430\u043d\u043d\u0456\u043c \u0447\u0430\u0441\u043e\u043c \u043d\u0430\u0434\u0437\u0432\u0438\u0447\u0430\u0439\u043d\u043e \u0440\u044f\u0441\u043d\u0438\u043c\u0438?", "lang": "uk"}, {"role": "Patient", "text": "\u0422\u0430\u043a, \u043e\u0441\u0442\u0430\u043d\u043d\u0456 \u043a\u0456\u043b\u044c\u043a\u0430 \u043c\u0456\u0441\u044f\u0446\u0456\u0432 \u0432\u043e\u043d\u0438 \u0434\u0443\u0436\u0435 \u0440\u044f\u0441\u043d\u0456 \u0456 \u0442\u0440\u0438\u0432\u0430\u044e\u0442\u044c \u0434\u043e\u0432\u0448\u0435, \u043d\u0456\u0436 \u0437\u0430\u0437\u0432\u0438\u0447\u0430\u0439. \u0427\u0438 \u0446\u0435 \u043f\u043e\u0432'\u044f\u0437\u0430\u043d\u043e?", "lang": "uk"}, {"role": "Interpreter", "text": "Yes, for the last few months they have been very heavy and last longer than usual. Is that connected?", "lang": "en"}, {"role": "Doctor", "text": "Yes, heavy periods are a leading cause of anemia in women. I would like to refer you to a gynecologist for a pelvic ultrasound to check for fibroids.", "lang": "en"}, {"role": "Interpreter", "text": "\u0422\u0430\u043a, \u0440\u044f\u0441\u043d\u0456 \u043c\u0435\u043d\u0441\u0442\u0440\u0443\u0430\u0446\u0456\u0457 \u0454 \u0433\u043e\u043b\u043e\u0432\u043d\u043e\u044e \u043f\u0440\u0438\u0447\u0438\u043d\u043e\u044e \u0430\u043d\u0435\u043c\u0456\u0457 \u0443 \u0436\u0456\u043d\u043e\u043a. \u042f \u0445\u043e\u0442\u0456\u0432 \u0431\u0438 \u043d\u0430\u043f\u0440\u0430\u0432\u0438\u0442\u0438 \u0432\u0430\u0441 \u0434\u043e \u0433\u0456\u043d\u0435\u043a\u043e\u043b\u043e\u0433\u0430 \u043d\u0430 \u0423\u0417\u0414 \u043e\u0440\u0433\u0430\u043d\u0456\u0432 \u043c\u0430\u043b\u043e\u0433\u043e \u0442\u0430\u0437\u0430, \u0449\u043e\u0431 \u043f\u0435\u0440\u0435\u0432\u0456\u0440\u0438\u0442\u0438 \u043d\u0430\u044f\u0432\u043d\u0456\u0441\u0442\u044c \u043c\u0456\u043e\u043c\u0438.", "lang": "uk"}]}, {"title": "Vegetarian Diet and B12", "topic": "ANEMIA", "messages": [{"role": "Doctor", "text": "Your complete blood count shows macrocytic anemia. This means your red blood cells are larger than normal, which is often caused by a Vitamin B12 deficiency.", "lang": "en"}, {"role": "Interpreter", "text": "\u0412\u0430\u0448 \u0437\u0430\u0433\u0430\u043b\u044c\u043d\u0438\u0439 \u0430\u043d\u0430\u043b\u0456\u0437 \u043a\u0440\u043e\u0432\u0456 \u043f\u043e\u043a\u0430\u0437\u0443\u0454 \u043c\u0430\u043a\u0440\u043e\u0446\u0438\u0442\u0430\u0440\u043d\u0443 \u0430\u043d\u0435\u043c\u0456\u044e. \u0426\u0435 \u043e\u0437\u043d\u0430\u0447\u0430\u0454, \u0449\u043e \u0432\u0430\u0448\u0456 \u0435\u0440\u0438\u0442\u0440\u043e\u0446\u0438\u0442\u0438 \u0431\u0456\u043b\u044c\u0448\u0456 \u0437\u0430 \u043d\u043e\u0440\u043c\u0443, \u0449\u043e \u0447\u0430\u0441\u0442\u043e \u0441\u043f\u0440\u0438\u0447\u0438\u043d\u0435\u043d\u043e \u0434\u0435\u0444\u0456\u0446\u0438\u0442\u043e\u043c \u0432\u0456\u0442\u0430\u043c\u0456\u043d\u0443 \u041212.", "lang": "uk"}, {"role": "Patient", "text": "\u0414\u0435\u0444\u0456\u0446\u0438\u0442 \u0432\u0456\u0442\u0430\u043c\u0456\u043d\u0443 \u041212? \u0410\u043b\u0435 \u0436 \u044f \u0457\u043c \u0431\u0430\u0433\u0430\u0442\u043e \u0448\u043f\u0438\u043d\u0430\u0442\u0443 \u0442\u0430 \u0433\u0440\u0430\u043d\u0430\u0442\u0456\u0432, \u044f\u043a \u0440\u0430\u0434\u0438\u043b\u0430 \u043c\u043e\u044f \u0431\u0430\u0431\u0443\u0441\u044f \u0434\u043b\u044f \u0445\u043e\u0440\u043e\u0448\u043e\u0457 \u043a\u0440\u043e\u0432\u0456.", "lang": "uk"}, {"role": "Interpreter", "text": "Vitamin B12 deficiency? But I eat a lot of spinach and pomegranates, as my grandmother advised for good blood.", "lang": "en"}, {"role": "Doctor", "text": "Those are great for iron, but B12 is almost exclusively found in animal products like meat, dairy, and eggs. Since you are on a strict vegan diet, you aren't getting enough.", "lang": "en"}, {"role": "Interpreter", "text": "\u0412\u043e\u043d\u0438 \u0447\u0443\u0434\u043e\u0432\u043e \u043f\u0456\u0434\u0445\u043e\u0434\u044f\u0442\u044c \u0434\u043b\u044f \u0437\u0430\u043b\u0456\u0437\u0430, \u0430\u043b\u0435 \u041212 \u043c\u0456\u0441\u0442\u0438\u0442\u044c\u0441\u044f \u043c\u0430\u0439\u0436\u0435 \u0432\u0438\u043a\u043b\u044e\u0447\u043d\u043e \u0432 \u043f\u0440\u043e\u0434\u0443\u043a\u0442\u0430\u0445 \u0442\u0432\u0430\u0440\u0438\u043d\u043d\u043e\u0433\u043e \u043f\u043e\u0445\u043e\u0434\u0436\u0435\u043d\u043d\u044f, \u0442\u0430\u043a\u0438\u0445 \u044f\u043a \u043c'\u044f\u0441\u043e, \u043c\u043e\u043b\u043e\u0447\u043d\u0456 \u043f\u0440\u043e\u0434\u0443\u043a\u0442\u0438 \u0442\u0430 \u044f\u0439\u0446\u044f. \u041e\u0441\u043a\u0456\u043b\u044c\u043a\u0438 \u0432\u0438 \u0434\u043e\u0442\u0440\u0438\u043c\u0443\u0454\u0442\u0435\u0441\u044c \u0441\u0443\u0432\u043e\u0440\u043e\u0457 \u0432\u0435\u0433\u0430\u043d\u0441\u044c\u043a\u043e\u0457 \u0434\u0456\u0454\u0442\u0438, \u0432\u0438 \u043d\u0435 \u043e\u0442\u0440\u0438\u043c\u0443\u0454\u0442\u0435 \u0439\u043e\u0433\u043e \u0432 \u0434\u043e\u0441\u0442\u0430\u0442\u043d\u0456\u0439 \u043a\u0456\u043b\u044c\u043a\u043e\u0441\u0442\u0456.", "lang": "uk"}, {"role": "Patient", "text": "\u0417\u0440\u043e\u0437\u0443\u043c\u0456\u043b\u043e. \u0422\u043e\u0434\u0456 \u0449\u043e \u043c\u0435\u043d\u0456 \u0440\u043e\u0431\u0438\u0442\u0438? \u042f \u043d\u0435 \u0445\u043e\u0447\u0443 \u043f\u043e\u0447\u0438\u043d\u0430\u0442\u0438 \u0457\u0441\u0442\u0438 \u043c'\u044f\u0441\u043e.", "lang": "uk"}, {"role": "Interpreter", "text": "I understand. What should I do then? I don't want to start eating meat.", "lang": "en"}, {"role": "Doctor", "text": "You don't have to. We can start you on a sublingual B12 supplement, which you let dissolve under your tongue daily. We'll retest your levels in 6 weeks.", "lang": "en"}, {"role": "Interpreter", "text": "\u0412\u0430\u043c \u0456 \u043d\u0435 \u043f\u043e\u0442\u0440\u0456\u0431\u043d\u043e. \u041c\u0438 \u043c\u043e\u0436\u0435\u043c\u043e \u043f\u0440\u0438\u0437\u043d\u0430\u0447\u0438\u0442\u0438 \u0432\u0430\u043c \u0441\u0443\u0431\u043b\u0456\u043d\u0433\u0432\u0430\u043b\u044c\u043d\u0443 \u0434\u043e\u0431\u0430\u0432\u043a\u0443 \u041212, \u044f\u043a\u0443 \u0432\u0438 \u0431\u0443\u0434\u0435\u0442\u0435 \u0449\u043e\u0434\u043d\u044f \u0440\u043e\u0437\u0441\u043c\u043e\u043a\u0442\u0443\u0432\u0430\u0442\u0438 \u043f\u0456\u0434 \u044f\u0437\u0438\u043a\u043e\u043c. \u041c\u0438 \u043f\u043e\u0432\u0442\u043e\u0440\u043d\u043e \u043f\u0435\u0440\u0435\u0432\u0456\u0440\u0438\u043c\u043e \u0432\u0430\u0448 \u0440\u0456\u0432\u0435\u043d\u044c \u0447\u0435\u0440\u0435\u0437 6 \u0442\u0438\u0436\u043d\u0456\u0432.", "lang": "uk"}]}, {"title": "Hashimoto's and Medication Switching", "topic": "THYROID", "messages": [{"role": "Doctor", "text": "Your antibody tests came back positive for Hashimoto's thyroiditis, which is an autoimmune condition causing your hypothyroidism.", "lang": "en"}, {"role": "Interpreter", "text": "\u0412\u0430\u0448\u0456 \u0442\u0435\u0441\u0442\u0438 \u043d\u0430 \u0430\u043d\u0442\u0438\u0442\u0456\u043b\u0430 \u0434\u0430\u043b\u0438 \u043f\u043e\u0437\u0438\u0442\u0438\u0432\u043d\u0438\u0439 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442 \u043d\u0430 \u0442\u0438\u0440\u0435\u043e\u0457\u0434\u0438\u0442 \u0425\u0430\u0448\u0438\u043c\u043e\u0442\u043e, \u0446\u0435 \u0430\u0443\u0442\u043e\u0456\u043c\u0443\u043d\u043d\u0435 \u0437\u0430\u0445\u0432\u043e\u0440\u044e\u0432\u0430\u043d\u043d\u044f, \u044f\u043a\u0435 \u0432\u0438\u043a\u043b\u0438\u043a\u0430\u0454 \u0432\u0430\u0448 \u0433\u0456\u043f\u043e\u0442\u0438\u0440\u0435\u043e\u0437.", "lang": "uk"}, {"role": "Patient", "text": "\u0410\u0443\u0442\u043e\u0456\u043c\u0443\u043d\u043d\u0435? \u0426\u0435 \u0437\u0432\u0443\u0447\u0438\u0442\u044c \u0441\u0435\u0440\u0439\u043e\u0437\u043d\u043e. \u041c\u0438\u043d\u0443\u043b\u043e\u0433\u043e \u043c\u0456\u0441\u044f\u0446\u044f \u0430\u043f\u0442\u0435\u043a\u0430 \u0432\u0438\u0434\u0430\u043b\u0430 \u043c\u0435\u043d\u0456 \u0456\u043d\u0448\u0456 \u0442\u0430\u0431\u043b\u0435\u0442\u043a\u0438, \u043d\u0435 \u0442\u0430\u043a\u0456, \u044f\u043a \u0437\u0430\u0432\u0436\u0434\u0438. \u0427\u0438 \u043c\u043e\u0433\u043b\u043e \u0446\u0435 \u0432\u043f\u043b\u0438\u043d\u0443\u0442\u0438?", "lang": "uk"}, {"role": "Interpreter", "text": "Autoimmune? That sounds serious. Last month the pharmacy gave me different pills, not the usual ones. Could that have affected it?", "lang": "en"}, {"role": "Doctor", "text": "Hashimoto's is common and very manageable. Regarding the pills, did they switch you from brand-name Synthroid to generic Levothyroxine?", "lang": "en"}, {"role": "Interpreter", "text": "\u0425\u0430\u0448\u0438\u043c\u043e\u0442\u043e \u0454 \u043f\u043e\u0448\u0438\u0440\u0435\u043d\u0438\u043c \u0437\u0430\u0445\u0432\u043e\u0440\u044e\u0432\u0430\u043d\u043d\u044f\u043c \u0456 \u0434\u0443\u0436\u0435 \u0434\u043e\u0431\u0440\u0435 \u043f\u0456\u0434\u0434\u0430\u0454\u0442\u044c\u0441\u044f \u043b\u0456\u043a\u0443\u0432\u0430\u043d\u043d\u044e. \u0429\u043e\u0434\u043e \u0442\u0430\u0431\u043b\u0435\u0442\u043e\u043a, \u0432\u043e\u043d\u0438 \u043f\u0435\u0440\u0435\u0432\u0435\u043b\u0438 \u0432\u0430\u0441 \u0437 \u0444\u0456\u0440\u043c\u043e\u0432\u043e\u0433\u043e \u0421\u0438\u043d\u0442\u0440\u043e\u0457\u0434\u0443 \u043d\u0430 \u0433\u0435\u043d\u0435\u0440\u0438\u0447\u043d\u0438\u0439 \u041b\u0435\u0432\u043e\u0442\u0438\u0440\u043e\u043a\u0441\u0438\u043d?", "lang": "uk"}, {"role": "Patient", "text": "\u0422\u0430\u043a, \u0443\u043f\u0430\u043a\u043e\u0432\u043a\u0430 \u0456\u043d\u0448\u0430. \u0406 \u044f \u043f\u043e\u0447\u0443\u0432\u0430\u044e\u0441\u044f \u0431\u0456\u043b\u044c\u0448 \u0432\u0442\u043e\u043c\u043b\u0435\u043d\u043e\u044e.", "lang": "uk"}, {"role": "Interpreter", "text": "Yes, the packaging is different. And I've been feeling more tired.", "lang": "en"}, {"role": "Doctor", "text": "Thyroid hormones can be very sensitive to formulation changes. I will write 'Dispense as Written' on your next prescription so they must give you the exact brand.", "lang": "en"}, {"role": "Interpreter", "text": "\u0413\u043e\u0440\u043c\u043e\u043d\u0438 \u0449\u0438\u0442\u043e\u0432\u0438\u0434\u043d\u043e\u0457 \u0437\u0430\u043b\u043e\u0437\u0438 \u043c\u043e\u0436\u0443\u0442\u044c \u0431\u0443\u0442\u0438 \u0434\u0443\u0436\u0435 \u0447\u0443\u0442\u043b\u0438\u0432\u0438\u043c\u0438 \u0434\u043e \u0437\u043c\u0456\u043d\u0438 \u0441\u043a\u043b\u0430\u0434\u0443 \u043f\u0440\u0435\u043f\u0430\u0440\u0430\u0442\u0443. \u0423 \u0432\u0430\u0448\u043e\u043c\u0443 \u043d\u0430\u0441\u0442\u0443\u043f\u043d\u043e\u043c\u0443 \u0440\u0435\u0446\u0435\u043f\u0442\u0456 \u044f \u043d\u0430\u043f\u0438\u0448\u0443 \u00ab\u0412\u0456\u0434\u043f\u0443\u0441\u043a\u0430\u0442\u0438 \u0431\u0435\u0437 \u0437\u0430\u043c\u0456\u043d\u00bb, \u0449\u043e\u0431 \u0432\u043e\u043d\u0438 \u043e\u0431\u043e\u0432'\u044f\u0437\u043a\u043e\u0432\u043e \u0432\u0438\u0434\u0430\u043b\u0438 \u0432\u0430\u043c \u0441\u0430\u043c\u0435 \u0446\u0435\u0439 \u0431\u0440\u0435\u043d\u0434.", "lang": "uk"}]}, {"title": "Hyperthyroidism Symptoms", "topic": "THYROID", "messages": [{"role": "Doctor", "text": "Your resting heart rate is 110 beats per minute, and you've lost 12 pounds without trying. Are you experiencing any tremors or anxiety?", "lang": "en"}, {"role": "Interpreter", "text": "\u0412\u0430\u0448 \u043f\u0443\u043b\u044c\u0441 \u0443 \u0441\u0442\u0430\u043d\u0456 \u0441\u043f\u043e\u043a\u043e\u044e \u0441\u0442\u0430\u043d\u043e\u0432\u0438\u0442\u044c 110 \u0443\u0434\u0430\u0440\u0456\u0432 \u043d\u0430 \u0445\u0432\u0438\u043b\u0438\u043d\u0443, \u0456 \u0432\u0438 \u0441\u0445\u0443\u0434\u043b\u0438 \u043d\u0430 12 \u0444\u0443\u043d\u0442\u0456\u0432 \u0431\u0435\u0437 \u0436\u043e\u0434\u043d\u0438\u0445 \u0437\u0443\u0441\u0438\u043b\u044c. \u0427\u0438 \u0432\u0456\u0434\u0447\u0443\u0432\u0430\u0454\u0442\u0435 \u0432\u0438 \u0442\u0440\u0435\u043c\u0442\u0456\u043d\u043d\u044f \u0430\u0431\u043e \u0442\u0440\u0438\u0432\u043e\u0436\u043d\u0456\u0441\u0442\u044c?", "lang": "uk"}, {"role": "Patient", "text": "\u0422\u0430\u043a, \u043c\u043e\u0457 \u0440\u0443\u043a\u0438 \u043f\u043e\u0441\u0442\u0456\u0439\u043d\u043e \u0442\u0440\u0435\u043c\u0442\u044f\u0442\u044c, \u0456 \u044f \u043d\u0435 \u043c\u043e\u0436\u0443 \u0437\u0430\u0441\u043d\u0443\u0442\u0438. \u041c\u0435\u043d\u0456 \u0437\u0434\u0430\u0454\u0442\u044c\u0441\u044f, \u0449\u043e \u044f \u0432\u0435\u0441\u044c \u0447\u0430\u0441 \u043a\u0443\u0434\u0438\u0441\u044c \u043f\u043e\u0441\u043f\u0456\u0448\u0430\u044e.", "lang": "uk"}, {"role": "Interpreter", "text": "Yes, my hands tremble constantly, and I can't fall asleep. I feel like I'm rushing somewhere all the time.", "lang": "en"}, {"role": "Doctor", "text": "These are classic signs of hyperthyroidism, an overactive thyroid. Your TSH level is almost undetectable.", "lang": "en"}, {"role": "Interpreter", "text": "\u0426\u0435 \u043a\u043b\u0430\u0441\u0438\u0447\u043d\u0456 \u043e\u0437\u043d\u0430\u043a\u0438 \u0433\u0456\u043f\u0435\u0440\u0442\u0438\u0440\u0435\u043e\u0437\u0443, \u043f\u0456\u0434\u0432\u0438\u0449\u0435\u043d\u043e\u0457 \u0444\u0443\u043d\u043a\u0446\u0456\u0457 \u0449\u0438\u0442\u043e\u0432\u0438\u0434\u043d\u043e\u0457 \u0437\u0430\u043b\u043e\u0437\u0438. \u0412\u0430\u0448 \u0440\u0456\u0432\u0435\u043d\u044c \u0422\u0422\u0413 \u043c\u0430\u0439\u0436\u0435 \u043d\u0435 \u0432\u0438\u0437\u043d\u0430\u0447\u0430\u0454\u0442\u044c\u0441\u044f.", "lang": "uk"}, {"role": "Patient", "text": "\u0427\u0438 \u043f\u043e\u0442\u0440\u0456\u0431\u043d\u0430 \u043c\u0435\u043d\u0456 \u043e\u043f\u0435\u0440\u0430\u0446\u0456\u044f? \u041c\u043e\u044f \u0441\u0443\u0441\u0456\u0434\u043a\u0430 \u0440\u043e\u0431\u0438\u043b\u0430 \u043e\u043f\u0435\u0440\u0430\u0446\u0456\u044e \u043d\u0430 \u0433\u043e\u0440\u043b\u0456 \u0447\u0435\u0440\u0435\u0437 \u043f\u043e\u0434\u0456\u0431\u043d\u0443 \u043f\u0440\u043e\u0431\u043b\u0435\u043c\u0443.", "lang": "uk"}, {"role": "Interpreter", "text": "Do I need surgery? My neighbor had throat surgery for a similar problem.", "lang": "en"}, {"role": "Doctor", "text": "Not necessarily. We'll start with medication like Methimazole to slow down hormone production before considering surgery or radioactive iodine.", "lang": "en"}, {"role": "Interpreter", "text": "\u041d\u0435 \u043e\u0431\u043e\u0432'\u044f\u0437\u043a\u043e\u0432\u043e. \u041c\u0438 \u043f\u043e\u0447\u043d\u0435\u043c\u043e \u0437 \u043c\u0435\u0434\u0438\u043a\u0430\u043c\u0435\u043d\u0442\u0456\u0432, \u0442\u0430\u043a\u0438\u0445 \u044f\u043a \u041c\u0435\u0442\u0438\u043c\u0430\u0437\u043e\u043b, \u0449\u043e\u0431 \u0443\u043f\u043e\u0432\u0456\u043b\u044c\u043d\u0438\u0442\u0438 \u0432\u0438\u0440\u043e\u0431\u043b\u0435\u043d\u043d\u044f \u0433\u043e\u0440\u043c\u043e\u043d\u0456\u0432, \u043f\u0435\u0440\u0448 \u043d\u0456\u0436 \u0440\u043e\u0437\u0433\u043b\u044f\u0434\u0430\u0442\u0438 \u0445\u0456\u0440\u0443\u0440\u0433\u0456\u0447\u043d\u0435 \u0432\u0442\u0440\u0443\u0447\u0430\u043d\u043d\u044f \u0430\u0431\u043e \u0440\u0430\u0434\u0456\u043e\u0430\u043a\u0442\u0438\u0432\u043d\u0438\u0439 \u0439\u043e\u0434.", "lang": "uk"}]}, {"title": "Thyroid Nodule Biopsy", "topic": "THYROID", "messages": [{"role": "Doctor", "text": "The ultrasound showed a 2-centimeter solid nodule on the right lobe of your thyroid. It has some irregular borders.", "lang": "en"}, {"role": "Interpreter", "text": "\u0423\u0417\u0414 \u043f\u043e\u043a\u0430\u0437\u0430\u043b\u043e \u0449\u0456\u043b\u044c\u043d\u0438\u0439 \u0432\u0443\u0437\u043e\u043b \u0440\u043e\u0437\u043c\u0456\u0440\u043e\u043c 2 \u0441\u0430\u043d\u0442\u0438\u043c\u0435\u0442\u0440\u0438 \u043d\u0430 \u043f\u0440\u0430\u0432\u0456\u0439 \u0447\u0430\u0441\u0442\u0446\u0456 \u0432\u0430\u0448\u043e\u0457 \u0449\u0438\u0442\u043e\u0432\u0438\u0434\u043d\u043e\u0457 \u0437\u0430\u043b\u043e\u0437\u0438. \u0412\u0456\u043d \u043c\u0430\u0454 \u0442\u0440\u043e\u0445\u0438 \u043d\u0435\u0440\u0456\u0432\u043d\u0456 \u043a\u043e\u043d\u0442\u0443\u0440\u0438.", "lang": "uk"}, {"role": "Patient", "text": "\u041d\u0435\u0440\u0456\u0432\u043d\u0456 \u043a\u043e\u043d\u0442\u0443\u0440\u0438? \u0426\u0435 \u043e\u0437\u043d\u0430\u0447\u0430\u0454, \u0449\u043e \u0446\u0435 \u0440\u0430\u043a?", "lang": "uk"}, {"role": "Interpreter", "text": "Irregular borders? Does that mean it's cancer?", "lang": "en"}, {"role": "Doctor", "text": "Not necessarily, the vast majority of thyroid nodules are benign. But to be safe, I want to perform a Fine Needle Aspiration, or FNA biopsy.", "lang": "en"}, {"role": "Interpreter", "text": "\u041d\u0435 \u043e\u0431\u043e\u0432'\u044f\u0437\u043a\u043e\u0432\u043e, \u043f\u0435\u0440\u0435\u0432\u0430\u0436\u043d\u0430 \u0431\u0456\u043b\u044c\u0448\u0456\u0441\u0442\u044c \u0432\u0443\u0437\u043b\u0456\u0432 \u0449\u0438\u0442\u043e\u0432\u0438\u0434\u043d\u043e\u0457 \u0437\u0430\u043b\u043e\u0437\u0438 \u0454 \u0434\u043e\u0431\u0440\u043e\u044f\u043a\u0456\u0441\u043d\u0438\u043c\u0438. \u0410\u043b\u0435 \u0434\u043b\u044f \u0432\u043f\u0435\u0432\u043d\u0435\u043d\u043e\u0441\u0442\u0456 \u044f \u0445\u043e\u0447\u0443 \u0437\u0440\u043e\u0431\u0438\u0442\u0438 \u0442\u043e\u043d\u043a\u043e\u0433\u043e\u043b\u043a\u043e\u0432\u0443 \u0430\u0441\u043f\u0456\u0440\u0430\u0446\u0456\u0439\u043d\u0443 \u0431\u0456\u043e\u043f\u0441\u0456\u044e.", "lang": "uk"}, {"role": "Patient", "text": "\u0426\u0435 \u0431\u043e\u043b\u044f\u0447\u0435? \u041c\u0435\u043d\u0456 \u0431\u0443\u0434\u0443\u0442\u044c \u0440\u043e\u0431\u0438\u0442\u0438 \u0437\u0430\u0433\u0430\u043b\u044c\u043d\u0438\u0439 \u043d\u0430\u0440\u043a\u043e\u0437?", "lang": "uk"}, {"role": "Interpreter", "text": "Is it painful? Will I have general anesthesia?", "lang": "en"}, {"role": "Doctor", "text": "We only use local anesthesia to numb the skin on your neck. You will feel some pressure, but it takes less than 15 minutes and you can go home right after.", "lang": "en"}, {"role": "Interpreter", "text": "\u041c\u0438 \u0432\u0438\u043a\u043e\u0440\u0438\u0441\u0442\u043e\u0432\u0443\u0454\u043c\u043e \u043b\u0438\u0448\u0435 \u043c\u0456\u0441\u0446\u0435\u0432\u0443 \u0430\u043d\u0435\u0441\u0442\u0435\u0437\u0456\u044e, \u0449\u043e\u0431 \u0437\u043d\u0435\u0431\u043e\u043b\u0438\u0442\u0438 \u0448\u043a\u0456\u0440\u0443 \u043d\u0430 \u0448\u0438\u0457. \u0412\u0438 \u0432\u0456\u0434\u0447\u0443\u0454\u0442\u0435 \u043d\u0435\u0432\u0435\u043b\u0438\u043a\u0438\u0439 \u0442\u0438\u0441\u043a, \u0430\u043b\u0435 \u0446\u0435 \u0437\u0430\u0439\u043c\u0430\u0454 \u043c\u0435\u043d\u0448\u0435 15 \u0445\u0432\u0438\u043b\u0438\u043d, \u0456 \u0432\u0438 \u0437\u043c\u043e\u0436\u0435\u0442\u0435 \u043e\u0434\u0440\u0430\u0437\u0443 \u043f\u0456\u0442\u0438 \u0434\u043e\u0434\u043e\u043c\u0443.", "lang": "uk"}]}, {"title": "Focal Seizures and Auras", "topic": "SEIZURES", "messages": [{"role": "Doctor", "text": "Your husband mentioned that right before you lost consciousness, you were smacking your lips and staring blankly into space.", "lang": "en"}, {"role": "Interpreter", "text": "\u0412\u0430\u0448 \u0447\u043e\u043b\u043e\u0432\u0456\u043a \u0437\u0433\u0430\u0434\u0430\u0432, \u0449\u043e \u0431\u0435\u0437\u043f\u043e\u0441\u0435\u0440\u0435\u0434\u043d\u044c\u043e \u043f\u0435\u0440\u0435\u0434 \u0432\u0442\u0440\u0430\u0442\u043e\u044e \u0441\u0432\u0456\u0434\u043e\u043c\u043e\u0441\u0442\u0456 \u0432\u0438 \u043f\u0440\u0438\u0446\u043c\u043e\u043a\u0443\u0432\u0430\u043b\u0438 \u0433\u0443\u0431\u0430\u043c\u0438 \u0456 \u0434\u0438\u0432\u0438\u043b\u0438\u0441\u044f \u043f\u043e\u0440\u043e\u0436\u043d\u0456\u043c \u043f\u043e\u0433\u043b\u044f\u0434\u043e\u043c \u0443 \u043f\u0440\u043e\u0441\u0442\u0456\u0440.", "lang": "uk"}, {"role": "Patient", "text": "\u0422\u0430\u043a, \u044f \u0446\u044c\u043e\u0433\u043e \u043d\u0435 \u043f\u0430\u043c'\u044f\u0442\u0430\u044e. \u0410\u043b\u0435 \u043f\u0435\u0440\u0435\u0434 \u0442\u0438\u043c \u044f \u0432\u0456\u0434\u0447\u0443\u043b\u0430 \u0441\u0438\u043b\u044c\u043d\u0438\u0439 \u0437\u0430\u043f\u0430\u0445 \u043f\u0430\u043b\u0435\u043d\u043e\u0457 \u0433\u0443\u043c\u0438, \u0445\u043e\u0447\u0430 \u043d\u0456\u0447\u043e\u0433\u043e \u043d\u0435 \u0433\u043e\u0440\u0456\u043b\u043e.", "lang": "uk"}, {"role": "Interpreter", "text": "Yes, I don't remember that. But before that I smelled a strong odor of burning rubber, even though nothing was burning.", "lang": "en"}, {"role": "Doctor", "text": "That phantom smell is called an aura, which is actually a small, localized seizure in the brain before it spreads. We call this a focal impaired awareness seizure.", "lang": "en"}, {"role": "Interpreter", "text": "\u0426\u0435\u0439 \u0444\u0430\u043d\u0442\u043e\u043c\u043d\u0438\u0439 \u0437\u0430\u043f\u0430\u0445 \u043d\u0430\u0437\u0438\u0432\u0430\u0454\u0442\u044c\u0441\u044f \u0430\u0443\u0440\u043e\u044e, \u044f\u043a\u0430 \u043d\u0430\u0441\u043f\u0440\u0430\u0432\u0434\u0456 \u0454 \u043d\u0435\u0432\u0435\u043b\u0438\u043a\u0438\u043c, \u043b\u043e\u043a\u0430\u043b\u0456\u0437\u043e\u0432\u0430\u043d\u0438\u043c \u043d\u0430\u043f\u0430\u0434\u043e\u043c \u0443 \u043c\u043e\u0437\u043a\u0443 \u0434\u043e \u0439\u043e\u0433\u043e \u043f\u043e\u0448\u0438\u0440\u0435\u043d\u043d\u044f. \u041c\u0438 \u043d\u0430\u0437\u0438\u0432\u0430\u0454\u043c\u043e \u0446\u0435 \u0444\u043e\u043a\u0430\u043b\u044c\u043d\u0438\u043c \u043d\u0430\u043f\u0430\u0434\u043e\u043c \u0456\u0437 \u043f\u043e\u0440\u0443\u0448\u0435\u043d\u043d\u044f\u043c \u0441\u0432\u0456\u0434\u043e\u043c\u043e\u0441\u0442\u0456.", "lang": "uk"}, {"role": "Patient", "text": "\u0427\u0438 \u043e\u0437\u043d\u0430\u0447\u0430\u0454 \u0446\u0435, \u0449\u043e \u0432 \u043c\u0435\u043d\u0435 \u0435\u043f\u0456\u043b\u0435\u043f\u0441\u0456\u044f? \u042f \u0434\u0443\u0436\u0435 \u0445\u0432\u0438\u043b\u044e\u044e\u0441\u044f \u0437\u0430 \u0441\u0432\u043e\u044e \u0440\u043e\u0431\u043e\u0442\u0443.", "lang": "uk"}, {"role": "Interpreter", "text": "Does this mean I have epilepsy? I am very worried about my job.", "lang": "en"}, {"role": "Doctor", "text": "We cannot diagnose epilepsy from a single event. We need to schedule an EEG and a brain MRI first to look for any structural causes.", "lang": "en"}, {"role": "Interpreter", "text": "\u041c\u0438 \u043d\u0435 \u043c\u043e\u0436\u0435\u043c\u043e \u043f\u043e\u0441\u0442\u0430\u0432\u0438\u0442\u0438 \u0434\u0456\u0430\u0433\u043d\u043e\u0437 \u00ab\u0435\u043f\u0456\u043b\u0435\u043f\u0441\u0456\u044f\u00bb \u043d\u0430 \u043f\u0456\u0434\u0441\u0442\u0430\u0432\u0456 \u043e\u0434\u043d\u043e\u0433\u043e \u0432\u0438\u043f\u0430\u0434\u043a\u0443. \u0421\u043f\u0435\u0440\u0448\u0443 \u043d\u0430\u043c \u043f\u043e\u0442\u0440\u0456\u0431\u043d\u043e \u043f\u0440\u0438\u0437\u043d\u0430\u0447\u0438\u0442\u0438 \u0415\u0415\u0413 \u0442\u0430 \u041c\u0420\u0422 \u0433\u043e\u043b\u043e\u0432\u043d\u043e\u0433\u043e \u043c\u043e\u0437\u043a\u0443, \u0449\u043e\u0431 \u043f\u0435\u0440\u0435\u0432\u0456\u0440\u0438\u0442\u0438 \u043d\u0430\u044f\u0432\u043d\u0456\u0441\u0442\u044c \u0441\u0442\u0440\u0443\u043a\u0442\u0443\u0440\u043d\u0438\u0445 \u043f\u0440\u0438\u0447\u0438\u043d.", "lang": "uk"}]}, {"title": "Anti-Epileptic Medication Side Effects", "topic": "SEIZURES", "messages": [{"role": "Doctor", "text": "You've been on Keppra for a month now. Have you had any breakthrough seizures since you started the medication?", "lang": "en"}, {"role": "Interpreter", "text": "\u0412\u0438 \u043f\u0440\u0438\u0439\u043c\u0430\u0454\u0442\u0435 \u041a\u0435\u043f\u043f\u0440\u0443 \u0432\u0436\u0435 \u043c\u0456\u0441\u044f\u0446\u044c. \u0427\u0438 \u0431\u0443\u043b\u0438 \u0443 \u0432\u0430\u0441 \u043f\u0440\u043e\u0440\u0438\u0432\u043d\u0456 \u043d\u0430\u043f\u0430\u0434\u0438 \u0437 \u043c\u043e\u043c\u0435\u043d\u0442\u0443 \u043f\u043e\u0447\u0430\u0442\u043a\u0443 \u043f\u0440\u0438\u0439\u043e\u043c\u0443 \u043b\u0456\u043a\u0456\u0432?", "lang": "uk"}, {"role": "Patient", "text": "\u041d\u0430\u043f\u0430\u0434\u0456\u0432 \u043d\u0435 \u0431\u0443\u043b\u043e. \u0410\u043b\u0435 \u044f \u043f\u043e\u0447\u0443\u0432\u0430\u044e\u0441\u044f \u0436\u0430\u0445\u043b\u0438\u0432\u043e. \u042f \u043f\u043e\u0441\u0442\u0456\u0439\u043d\u043e \u0437\u043b\u0430 \u043d\u0430 \u0441\u0432\u043e\u044e \u0441\u0456\u043c'\u044e \u0431\u0435\u0437 \u0436\u043e\u0434\u043d\u043e\u0457 \u043f\u0440\u0438\u0447\u0438\u043d\u0438.", "lang": "uk"}, {"role": "Interpreter", "text": "No seizures. But I feel terrible. I am constantly angry at my family for no reason.", "lang": "en"}, {"role": "Interpreter", "text": "Excuse me, doctor, the interpreter needs to clarify a term with the patient.", "lang": "en"}, {"role": "Interpreter", "text": "\u0412\u0438\u0431\u0430\u0447\u0442\u0435, \u0432\u0438 \u043c\u0430\u0454\u0442\u0435 \u043d\u0430 \u0443\u0432\u0430\u0437\u0456 \u0440\u043e\u0437\u0434\u0440\u0430\u0442\u0443\u0432\u0430\u043d\u043d\u044f \u0447\u0438 \u0441\u043f\u0430\u043b\u0430\u0445\u0438 \u0433\u043d\u0456\u0432\u0443?", "lang": "uk"}, {"role": "Patient", "text": "\u0421\u043f\u0430\u043b\u0430\u0445\u0438 \u0433\u043d\u0456\u0432\u0443. \u042f \u0434\u0443\u0436\u0435 \u0430\u0433\u0440\u0435\u0441\u0438\u0432\u043d\u0430.", "lang": "uk"}, {"role": "Interpreter", "text": "The patient clarified she is experiencing outbursts of anger and aggression.", "lang": "en"}, {"role": "Doctor", "text": "I appreciate the clarification. Keppra is known to cause severe mood changes, sometimes called 'Keppra rage'. We will slowly taper you off this and start you on Lamictal instead.", "lang": "en"}, {"role": "Interpreter", "text": "\u0414\u044f\u043a\u0443\u044e \u0437\u0430 \u0443\u0442\u043e\u0447\u043d\u0435\u043d\u043d\u044f. \u0412\u0456\u0434\u043e\u043c\u043e, \u0449\u043e \u041a\u0435\u043f\u043f\u0440\u0430 \u0441\u043f\u0440\u0438\u0447\u0438\u043d\u044f\u0454 \u0441\u0435\u0440\u0439\u043e\u0437\u043d\u0456 \u0437\u043c\u0456\u043d\u0438 \u043d\u0430\u0441\u0442\u0440\u043e\u044e, \u0456\u043d\u043e\u0434\u0456 \u0446\u0435 \u043d\u0430\u0437\u0438\u0432\u0430\u044e\u0442\u044c \u00ab\u043b\u044e\u0442\u044c \u041a\u0435\u043f\u043f\u0440\u0438\u00bb. \u041c\u0438 \u0431\u0443\u0434\u0435\u043c\u043e \u043f\u043e\u0432\u0456\u043b\u044c\u043d\u043e \u0437\u043d\u0438\u0436\u0443\u0432\u0430\u0442\u0438 \u0432\u0430\u0448\u0443 \u0434\u043e\u0437\u0443 \u0456 \u043d\u0430\u0442\u043e\u043c\u0456\u0441\u0442\u044c \u043f\u043e\u0447\u043d\u0435\u043c\u043e \u043f\u0440\u0438\u0439\u043e\u043c \u041b\u0430\u043c\u0456\u043a\u0442\u0430\u043b\u0443.", "lang": "uk"}]}, {"title": "Post-Ictal State and Driving Laws", "topic": "SEIZURES", "messages": [{"role": "Doctor", "text": "The paramedics noted you were extremely confused and lethargic for about an hour after the convulsions stopped. This is known as the post-ictal state.", "lang": "en"}, {"role": "Interpreter", "text": "\u0424\u0435\u043b\u044c\u0434\u0448\u0435\u0440\u0438 \u0432\u0456\u0434\u0437\u043d\u0430\u0447\u0438\u043b\u0438, \u0449\u043e \u0432\u0438 \u0431\u0443\u043b\u0438 \u0432\u043a\u0440\u0430\u0439 \u0440\u043e\u0437\u0433\u0443\u0431\u043b\u0435\u043d\u0456 \u0442\u0430 \u043c\u043b\u044f\u0432\u0456 \u0431\u043b\u0438\u0437\u044c\u043a\u043e \u0433\u043e\u0434\u0438\u043d\u0438 \u043f\u0456\u0441\u043b\u044f \u0442\u043e\u0433\u043e, \u044f\u043a \u043f\u0440\u0438\u043f\u0438\u043d\u0438\u043b\u0438\u0441\u044f \u0441\u0443\u0434\u043e\u043c\u0438. \u0426\u0435 \u043d\u0430\u0437\u0438\u0432\u0430\u0454\u0442\u044c\u0441\u044f \u043f\u043e\u0441\u0442\u0456\u043a\u0442\u0430\u043b\u044c\u043d\u0438\u043c \u0441\u0442\u0430\u043d\u043e\u043c.", "lang": "uk"}, {"role": "Patient", "text": "\u041c\u043e\u0457 \u043c'\u044f\u0437\u0438 \u0434\u0443\u0436\u0435 \u0431\u043e\u043b\u0456\u043b\u0438, \u0456 \u044f \u043f\u0440\u0438\u043a\u0443\u0441\u0438\u043b\u0430 \u044f\u0437\u0438\u043a\u0430. \u041b\u0456\u043a\u0430\u0440\u044e, \u043a\u043e\u043b\u0438 \u044f \u0437\u043c\u043e\u0436\u0443 \u0437\u043d\u043e\u0432\u0443 \u0432\u043e\u0434\u0438\u0442\u0438 \u043c\u0430\u0448\u0438\u043d\u0443? \u041c\u0435\u043d\u0456 \u0442\u0440\u0435\u0431\u0430 \u0432\u0456\u0434\u0432\u043e\u0437\u0438\u0442\u0438 \u0434\u0456\u0442\u0435\u0439 \u0434\u043e \u0448\u043a\u043e\u043b\u0438.", "lang": "uk"}, {"role": "Interpreter", "text": "My muscles ached a lot, and I bit my tongue. Doctor, when can I drive again? I need to take my kids to school.", "lang": "en"}, {"role": "Doctor", "text": "By state law, I am required to report this seizure to the DMV. Your license will be suspended for a mandatory six-month seizure-free period.", "lang": "en"}, {"role": "Interpreter", "text": "\u0417\u0433\u0456\u0434\u043d\u043e \u0456\u0437 \u0437\u0430\u043a\u043e\u043d\u043e\u043c \u0448\u0442\u0430\u0442\u0443, \u044f \u0437\u043e\u0431\u043e\u0432'\u044f\u0437\u0430\u043d\u0438\u0439 \u043f\u043e\u0432\u0456\u0434\u043e\u043c\u0438\u0442\u0438 \u043f\u0440\u043e \u0446\u0435\u0439 \u043d\u0430\u043f\u0430\u0434 \u0434\u043e \u0414\u0435\u043f\u0430\u0440\u0442\u0430\u043c\u0435\u043d\u0442\u0443 \u0430\u0432\u0442\u043e\u0442\u0440\u0430\u043d\u0441\u043f\u043e\u0440\u0442\u0443. \u0412\u0430\u0448\u0443 \u043b\u0456\u0446\u0435\u043d\u0437\u0456\u044e \u0431\u0443\u0434\u0435 \u043f\u0440\u0438\u0437\u0443\u043f\u0438\u043d\u0435\u043d\u043e \u043d\u0430 \u043e\u0431\u043e\u0432'\u044f\u0437\u043a\u043e\u0432\u0438\u0439 \u0448\u0435\u0441\u0442\u0438\u043c\u0456\u0441\u044f\u0447\u043d\u0438\u0439 \u043f\u0435\u0440\u0456\u043e\u0434 \u0431\u0435\u0437 \u043d\u0430\u043f\u0430\u0434\u0456\u0432.", "lang": "uk"}, {"role": "Patient", "text": "\u0428\u0456\u0441\u0442\u044c \u043c\u0456\u0441\u044f\u0446\u0456\u0432?! \u0426\u0435 \u0437\u0440\u0443\u0439\u043d\u0443\u0454 \u043c\u043e\u0454 \u0436\u0438\u0442\u0442\u044f. \u0427\u0438 \u0454 \u044f\u043a\u0456\u0441\u044c \u0432\u0438\u043d\u044f\u0442\u043a\u0438, \u044f\u043a\u0449\u043e \u044f \u0431\u0443\u0434\u0443 \u043e\u0431\u0435\u0440\u0435\u0436\u043d\u043e\u044e?", "lang": "uk"}, {"role": "Interpreter", "text": "Six months?! This will ruin my life. Are there any exceptions if I am careful?", "lang": "en"}, {"role": "Doctor", "text": "I know this is incredibly difficult news. Unfortunately, there are no exceptions. If you drive and have a seizure, it could be fatal.", "lang": "en"}, {"role": "Interpreter", "text": "\u042f \u0437\u043d\u0430\u044e, \u0449\u043e \u0446\u0435 \u043d\u0435\u0439\u043c\u043e\u0432\u0456\u0440\u043d\u043e \u0432\u0430\u0436\u043a\u0430 \u043d\u043e\u0432\u0438\u043d\u0430. \u041d\u0430 \u0436\u0430\u043b\u044c, \u0432\u0438\u043d\u044f\u0442\u043a\u0456\u0432 \u043d\u0435\u043c\u0430\u0454. \u042f\u043a\u0449\u043e \u0432\u0438 \u043a\u0435\u0440\u0443\u0432\u0430\u0442\u0438\u043c\u0435\u0442\u0435 \u0430\u0432\u0442\u043e\u043c\u043e\u0431\u0456\u043b\u0435\u043c \u0456 \u0443 \u0432\u0430\u0441 \u0441\u0442\u0430\u043d\u0435\u0442\u044c\u0441\u044f \u043d\u0430\u043f\u0430\u0434, \u0446\u0435 \u043c\u043e\u0436\u0435 \u043f\u0440\u0438\u0437\u0432\u0435\u0441\u0442\u0438 \u0434\u043e \u043b\u0435\u0442\u0430\u043b\u044c\u043d\u0438\u0445 \u043d\u0430\u0441\u043b\u0456\u0434\u043a\u0456\u0432.", "lang": "uk"}]}, {"title": "Prostate Screening Concerns", "topic": "GENERAL WELLNESS", "messages": [{"role": "Doctor", "text": "Since you recently turned 50, it is time to discuss prostate cancer screening. We typically start with a PSA blood test.", "lang": "en"}, {"role": "Interpreter", "text": "\u041e\u0441\u043a\u0456\u043b\u044c\u043a\u0438 \u0432\u0430\u043c \u043d\u0435\u0449\u043e\u0434\u0430\u0432\u043d\u043e \u0432\u0438\u043f\u043e\u0432\u043d\u0438\u043b\u043e\u0441\u044f 50 \u0440\u043e\u043a\u0456\u0432, \u043d\u0430\u0441\u0442\u0430\u0432 \u0447\u0430\u0441 \u043e\u0431\u0433\u043e\u0432\u043e\u0440\u0438\u0442\u0438 \u0441\u043a\u0440\u0438\u043d\u0456\u043d\u0433 \u043d\u0430 \u0440\u0430\u043a \u043f\u0435\u0440\u0435\u0434\u043c\u0456\u0445\u0443\u0440\u043e\u0432\u043e\u0457 \u0437\u0430\u043b\u043e\u0437\u0438. \u0417\u0430\u0437\u0432\u0438\u0447\u0430\u0439 \u043c\u0438 \u043f\u043e\u0447\u0438\u043d\u0430\u0454\u043c\u043e \u0437 \u0430\u043d\u0430\u043b\u0456\u0437\u0443 \u043a\u0440\u043e\u0432\u0456 \u043d\u0430 \u041f\u0421\u0410.", "lang": "uk"}, {"role": "Patient", "text": "\u041c\u0456\u0439 \u0431\u0430\u0442\u044c\u043a\u043e \u043c\u0430\u0432 \u0440\u0430\u043a \u043f\u0440\u043e\u0441\u0442\u0430\u0442\u0438, \u0442\u043e\u043c\u0443 \u044f \u0445\u043e\u0447\u0443 \u043f\u0435\u0440\u0435\u0432\u0456\u0440\u0438\u0442\u0438\u0441\u044f. \u0410\u043b\u0435 \u044f \u0447\u0443\u0432, \u0449\u043e \u0446\u0435\u0439 \u0442\u0435\u0441\u0442 \u0434\u0443\u0436\u0435 \u043d\u0435\u0437\u0440\u0443\u0447\u043d\u0438\u0439 \u0456 \u0431\u043e\u043b\u0456\u0441\u043d\u0438\u0439.", "lang": "uk"}, {"role": "Interpreter", "text": "My father had prostate cancer, so I want to get checked. But I heard this test is very uncomfortable and painful.", "lang": "en"}, {"role": "Doctor", "text": "You might be thinking of the digital rectal exam. While still useful, the PSA is just a standard blood draw from your arm. It measures a specific protein produced by the prostate gland.", "lang": "en"}, {"role": "Interpreter", "text": "\u041c\u043e\u0436\u043b\u0438\u0432\u043e, \u0432\u0438 \u043c\u0430\u0454\u0442\u0435 \u043d\u0430 \u0443\u0432\u0430\u0437\u0456 \u043f\u0430\u043b\u044c\u0446\u0435\u0432\u0435 \u0440\u0435\u043a\u0442\u0430\u043b\u044c\u043d\u0435 \u0434\u043e\u0441\u043b\u0456\u0434\u0436\u0435\u043d\u043d\u044f. \u0425\u043e\u0447\u0430 \u0432\u043e\u043d\u043e \u0434\u043e\u0441\u0456 \u043a\u043e\u0440\u0438\u0441\u043d\u0435, \u041f\u0421\u0410 \u2014 \u0446\u0435 \u043f\u0440\u043e\u0441\u0442\u043e \u0441\u0442\u0430\u043d\u0434\u0430\u0440\u0442\u043d\u0438\u0439 \u0437\u0430\u0431\u0456\u0440 \u043a\u0440\u043e\u0432\u0456 \u0437 \u0432\u0435\u043d\u0438 \u043d\u0430 \u0440\u0443\u0446\u0456. \u0412\u0456\u043d \u0432\u0438\u043c\u0456\u0440\u044e\u0454 \u0441\u043f\u0435\u0446\u0438\u0444\u0456\u0447\u043d\u0438\u0439 \u0431\u0456\u043b\u043e\u043a, \u0449\u043e \u0432\u0438\u0440\u043e\u0431\u043b\u044f\u0454\u0442\u044c\u0441\u044f \u043f\u0435\u0440\u0435\u0434\u043c\u0456\u0445\u0443\u0440\u043e\u0432\u043e\u044e \u0437\u0430\u043b\u043e\u0437\u043e\u044e.", "lang": "uk"}, {"role": "Patient", "text": "\u041e, \u0446\u0435 \u043d\u0430\u0431\u0430\u0433\u0430\u0442\u043e \u043a\u0440\u0430\u0449\u0435. \u0422\u0430\u043a, \u0434\u0430\u0432\u0430\u0439\u0442\u0435 \u0437\u0440\u043e\u0431\u0438\u043c\u043e \u0430\u043d\u0430\u043b\u0456\u0437 \u043a\u0440\u043e\u0432\u0456.", "lang": "uk"}, {"role": "Interpreter", "text": "Oh, that is much better. Yes, let's do the blood test.", "lang": "en"}]}, {"title": "Cholesterol and Statin Hesitancy", "topic": "GENERAL WELLNESS", "messages": [{"role": "Doctor", "text": "Your lipid panel came back, and your LDL, or 'bad' cholesterol, is quite high at 190. Given your family history of heart disease, I recommend starting a statin medication.", "lang": "en"}, {"role": "Interpreter", "text": "\u041f\u0440\u0438\u0439\u0448\u043b\u0438 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0438 \u0432\u0430\u0448\u043e\u0457 \u043b\u0456\u043f\u0456\u0434\u043e\u0433\u0440\u0430\u043c\u0438, \u0456 \u0432\u0430\u0448 \u041b\u041f\u041d\u0429, \u0430\u0431\u043e \u00ab\u043f\u043e\u0433\u0430\u043d\u0438\u0439\u00bb \u0445\u043e\u043b\u0435\u0441\u0442\u0435\u0440\u0438\u043d, \u0434\u043e\u0441\u0438\u0442\u044c \u0432\u0438\u0441\u043e\u043a\u0438\u0439 \u2014 190. \u0417 \u043e\u0433\u043b\u044f\u0434\u0443 \u043d\u0430 \u0441\u0456\u043c\u0435\u0439\u043d\u0443 \u0456\u0441\u0442\u043e\u0440\u0456\u044e \u0441\u0435\u0440\u0446\u0435\u0432\u0438\u0445 \u0437\u0430\u0445\u0432\u043e\u0440\u044e\u0432\u0430\u043d\u044c, \u044f \u0440\u0435\u043a\u043e\u043c\u0435\u043d\u0434\u0443\u044e \u043f\u043e\u0447\u0430\u0442\u0438 \u043f\u0440\u0438\u0439\u043e\u043c \u0441\u0442\u0430\u0442\u0438\u043d\u0456\u0432.", "lang": "uk"}, {"role": "Patient", "text": "\u042f \u0447\u0438\u0442\u0430\u043b\u0430 \u0432 \u0456\u043d\u0442\u0435\u0440\u043d\u0435\u0442\u0456, \u0449\u043e \u0441\u0442\u0430\u0442\u0438\u043d\u0438 \u0440\u0443\u0439\u043d\u0443\u044e\u0442\u044c \u043f\u0435\u0447\u0456\u043d\u043a\u0443 \u0456 \u0432\u0438\u043a\u043b\u0438\u043a\u0430\u044e\u0442\u044c \u0431\u0456\u043b\u044c \u0443 \u043c'\u044f\u0437\u0430\u0445. \u042f \u0431 \u043a\u0440\u0430\u0449\u0435 \u0441\u043f\u0440\u043e\u0431\u0443\u0432\u0430\u043b\u0430 \u043e\u0447\u0438\u0449\u0435\u043d\u043d\u044f \u043e\u0440\u0433\u0430\u043d\u0456\u0437\u043c\u0443 \u0442\u0440\u0430\u0432\u0430\u043c\u0438.", "lang": "uk"}, {"role": "Interpreter", "text": "I read online that statins destroy the liver and cause muscle pain. I would rather try an herbal detox.", "lang": "en"}, {"role": "Doctor", "text": "I understand your hesitation. While muscle aches can be a side effect for a small percentage of people, severe liver damage is exceedingly rare. Herbal detoxes won't lower genetic cholesterol.", "lang": "en"}, {"role": "Interpreter", "text": "\u042f \u0440\u043e\u0437\u0443\u043c\u0456\u044e \u0432\u0430\u0448\u0456 \u0432\u0430\u0433\u0430\u043d\u043d\u044f. \u0425\u043e\u0447\u0430 \u0431\u0456\u043b\u044c \u0443 \u043c'\u044f\u0437\u0430\u0445 \u043c\u043e\u0436\u0435 \u0431\u0443\u0442\u0438 \u043f\u043e\u0431\u0456\u0447\u043d\u0438\u043c \u0435\u0444\u0435\u043a\u0442\u043e\u043c \u0443 \u043d\u0435\u0432\u0435\u043b\u0438\u043a\u043e\u0433\u043e \u0432\u0456\u0434\u0441\u043e\u0442\u043a\u0430 \u043b\u044e\u0434\u0435\u0439, \u0441\u0435\u0440\u0439\u043e\u0437\u043d\u0435 \u0443\u0448\u043a\u043e\u0434\u0436\u0435\u043d\u043d\u044f \u043f\u0435\u0447\u0456\u043d\u043a\u0438 \u0442\u0440\u0430\u043f\u043b\u044f\u0454\u0442\u044c\u0441\u044f \u0432\u043a\u0440\u0430\u0439 \u0440\u0456\u0434\u043a\u043e. \u0422\u0440\u0430\u0432'\u044f\u043d\u0456 \u043e\u0447\u0438\u0449\u0435\u043d\u043d\u044f \u043d\u0435 \u0437\u043d\u0438\u0437\u044f\u0442\u044c \u0433\u0435\u043d\u0435\u0442\u0438\u0447\u043d\u0438\u0439 \u0445\u043e\u043b\u0435\u0441\u0442\u0435\u0440\u0438\u043d.", "lang": "uk"}, {"role": "Patient", "text": "\u0414\u043e\u0431\u0440\u0435, \u0430\u043b\u0435 \u0447\u0438 \u043c\u043e\u0436\u0435\u043c\u043e \u043c\u0438 \u0434\u0430\u0442\u0438 \u043c\u0435\u043d\u0456 \u0442\u0440\u0438 \u043c\u0456\u0441\u044f\u0446\u0456, \u0449\u043e\u0431 \u0441\u043f\u0440\u043e\u0431\u0443\u0432\u0430\u0442\u0438 \u0437\u043d\u0438\u0437\u0438\u0442\u0438 \u0439\u043e\u0433\u043e \u0437\u0430 \u0434\u043e\u043f\u043e\u043c\u043e\u0433\u043e\u044e \u0434\u0456\u0454\u0442\u0438 \u0442\u0430 \u0444\u0456\u0437\u0438\u0447\u043d\u0438\u0445 \u0432\u043f\u0440\u0430\u0432, \u043f\u0435\u0440\u0448 \u043d\u0456\u0436 \u043f\u043e\u0447\u0438\u043d\u0430\u0442\u0438 \u043f\u0440\u0438\u0439\u043e\u043c \u0442\u0430\u0431\u043b\u0435\u0442\u043e\u043a?", "lang": "uk"}, {"role": "Interpreter", "text": "Okay, but can we give me three months to try to lower it with diet and exercise before starting pills?", "lang": "en"}, {"role": "Doctor", "text": "That is a reasonable compromise. We'll focus on a Mediterranean diet and recheck in three months. If it's still over 160, we'll revisit the medication.", "lang": "en"}, {"role": "Interpreter", "text": "\u0426\u0435 \u0440\u043e\u0437\u0443\u043c\u043d\u0438\u0439 \u043a\u043e\u043c\u043f\u0440\u043e\u043c\u0456\u0441. \u041c\u0438 \u0437\u043e\u0441\u0435\u0440\u0435\u0434\u0438\u043c\u043e\u0441\u044f \u043d\u0430 \u0441\u0435\u0440\u0435\u0434\u0437\u0435\u043c\u043d\u043e\u043c\u043e\u0440\u0441\u044c\u043a\u0456\u0439 \u0434\u0456\u0454\u0442\u0456 \u0442\u0430 \u043f\u043e\u0432\u0442\u043e\u0440\u043d\u043e \u043f\u0435\u0440\u0435\u0432\u0456\u0440\u0438\u043c\u043e \u0447\u0435\u0440\u0435\u0437 \u0442\u0440\u0438 \u043c\u0456\u0441\u044f\u0446\u0456. \u042f\u043a\u0449\u043e \u0432\u0456\u043d \u0432\u0441\u0435 \u0449\u0435 \u0431\u0443\u0434\u0435 \u0432\u0438\u0449\u0438\u043c \u0437\u0430 160, \u043c\u0438 \u043f\u043e\u0432\u0435\u0440\u043d\u0435\u043c\u043e\u0441\u044f \u0434\u043e \u043f\u0438\u0442\u0430\u043d\u043d\u044f \u043f\u0440\u043e \u043b\u0456\u043a\u0438.", "lang": "uk"}]}, {"title": "Sleep Apnea Symptoms", "topic": "GENERAL WELLNESS", "messages": [{"role": "Doctor", "text": "You mentioned you wake up feeling unrefreshed, often with morning headaches. Does your partner ever complain about you snoring loudly?", "lang": "en"}, {"role": "Interpreter", "text": "\u0412\u0438 \u0437\u0433\u0430\u0434\u0430\u043b\u0438, \u0449\u043e \u043f\u0440\u043e\u043a\u0438\u0434\u0430\u0454\u0442\u0435\u0441\u044f \u043d\u0435\u0432\u0438\u0441\u043f\u0430\u043d\u0438\u043c, \u0447\u0430\u0441\u0442\u043e \u0437 \u0440\u0430\u043d\u043a\u043e\u0432\u0438\u043c\u0438 \u0433\u043e\u043b\u043e\u0432\u043d\u0438\u043c\u0438 \u0431\u043e\u043b\u044f\u043c\u0438. \u0427\u0438 \u0441\u043a\u0430\u0440\u0436\u0438\u0442\u044c\u0441\u044f \u043a\u043e\u043b\u0438-\u043d\u0435\u0431\u0443\u0434\u044c \u0432\u0430\u0448\u0430 \u043f\u0430\u0440\u0442\u043d\u0435\u0440\u043a\u0430 \u043d\u0430 \u0442\u0435, \u0449\u043e \u0432\u0438 \u0433\u043e\u043b\u043e\u0441\u043d\u043e \u0445\u0440\u043e\u043f\u0435\u0442\u0435?", "lang": "uk"}, {"role": "Patient", "text": "\u0422\u0430\u043a, \u0432\u043e\u043d\u0430 \u043a\u0430\u0436\u0435, \u0449\u043e \u043c\u043e\u0454 \u0445\u0440\u043e\u043f\u0456\u043d\u043d\u044f \u0437\u0432\u0443\u0447\u0438\u0442\u044c \u0442\u0430\u043a, \u043d\u0456\u0431\u0438 \u044f \u0437\u0430\u0434\u0438\u0445\u0430\u044e\u0441\u044f, \u0456 \u0456\u043d\u043e\u0434\u0456 \u044f \u0432\u0437\u0430\u0433\u0430\u043b\u0456 \u043f\u0435\u0440\u0435\u0441\u0442\u0430\u044e \u0434\u0438\u0445\u0430\u0442\u0438 \u043d\u0430 \u043a\u0456\u043b\u044c\u043a\u0430 \u0441\u0435\u043a\u0443\u043d\u0434.", "lang": "uk"}, {"role": "Interpreter", "text": "Yes, she says my snoring sounds like I am choking, and sometimes I stop breathing altogether for a few seconds.", "lang": "en"}, {"role": "Doctor", "text": "That is a textbook description of Obstructive Sleep Apnea. Your airway collapses during sleep, dropping your oxygen levels, which puts immense strain on your heart.", "lang": "en"}, {"role": "Interpreter", "text": "\u0426\u0435 \u043a\u043b\u0430\u0441\u0438\u0447\u043d\u0438\u0439 \u043e\u043f\u0438\u0441 \u043e\u0431\u0441\u0442\u0440\u0443\u043a\u0442\u0438\u0432\u043d\u043e\u0433\u043e \u0430\u043f\u043d\u043e\u0435 \u0441\u043d\u0443. \u0412\u0430\u0448\u0456 \u0434\u0438\u0445\u0430\u043b\u044c\u043d\u0456 \u0448\u043b\u044f\u0445\u0438 \u0441\u043f\u0430\u0434\u0430\u044e\u0442\u044c\u0441\u044f \u043f\u0456\u0434 \u0447\u0430\u0441 \u0441\u043d\u0443, \u0437\u043d\u0438\u0436\u0443\u044e\u0447\u0438 \u0440\u0456\u0432\u0435\u043d\u044c \u043a\u0438\u0441\u043d\u044e, \u0449\u043e \u0441\u0442\u0432\u043e\u0440\u044e\u0454 \u0432\u0435\u043b\u0438\u0447\u0435\u0437\u043d\u0435 \u043d\u0430\u0432\u0430\u043d\u0442\u0430\u0436\u0435\u043d\u043d\u044f \u043d\u0430 \u0432\u0430\u0448\u0435 \u0441\u0435\u0440\u0446\u0435.", "lang": "uk"}, {"role": "Patient", "text": "\u0429\u043e \u043c\u0435\u043d\u0456 \u043f\u043e\u0442\u0440\u0456\u0431\u043d\u043e \u0440\u043e\u0431\u0438\u0442\u0438? \u042f \u043d\u0435 \u0445\u043e\u0447\u0443 \u043d\u043e\u0441\u0438\u0442\u0438 \u043a\u0438\u0441\u043d\u0435\u0432\u0443 \u043c\u0430\u0441\u043a\u0443 \u0432\u043d\u043e\u0447\u0456.", "lang": "uk"}, {"role": "Interpreter", "text": "What do I need to do? I don't want to wear an oxygen mask at night.", "lang": "en"}, {"role": "Doctor", "text": "First, we will order an overnight sleep study. If you do have sleep apnea, a CPAP machine\u2014which uses air pressure, not pure oxygen\u2014is the gold standard treatment.", "lang": "en"}, {"role": "Interpreter", "text": "\u0421\u043f\u0435\u0440\u0448\u0443 \u043c\u0438 \u043f\u0440\u0438\u0437\u043d\u0430\u0447\u0438\u043c\u043e \u043d\u0456\u0447\u043d\u0435 \u0434\u043e\u0441\u043b\u0456\u0434\u0436\u0435\u043d\u043d\u044f \u0441\u043d\u0443. \u042f\u043a\u0449\u043e \u0443 \u0432\u0430\u0441 \u0441\u043f\u0440\u0430\u0432\u0434\u0456 \u0430\u043f\u043d\u043e\u0435, \u0430\u043f\u0430\u0440\u0430\u0442 \u0421\u0406\u041f\u0410\u041f, \u044f\u043a\u0438\u0439 \u0432\u0438\u043a\u043e\u0440\u0438\u0441\u0442\u043e\u0432\u0443\u0454 \u0442\u0438\u0441\u043a \u043f\u043e\u0432\u0456\u0442\u0440\u044f, \u0430 \u043d\u0435 \u0447\u0438\u0441\u0442\u0438\u0439 \u043a\u0438\u0441\u0435\u043d\u044c, \u0454 \u0437\u043e\u043b\u043e\u0442\u0438\u043c \u0441\u0442\u0430\u043d\u0434\u0430\u0440\u0442\u043e\u043c \u043b\u0456\u043a\u0443\u0432\u0430\u043d\u043d\u044f.", "lang": "uk"}]}, {"title": "Angina and Nitroglycerin", "topic": "HEART ISSUES", "messages": [{"role": "Doctor", "text": "When you experience this chest tightness, how long does it usually last, and what makes it go away?", "lang": "en"}, {"role": "Interpreter", "text": "\u041a\u043e\u043b\u0438 \u0432\u0438 \u0432\u0456\u0434\u0447\u0443\u0432\u0430\u0454\u0442\u0435 \u0446\u0435 \u0441\u0442\u0438\u0441\u043d\u0435\u043d\u043d\u044f \u0432 \u0433\u0440\u0443\u0434\u044f\u0445, \u044f\u043a \u0434\u043e\u0432\u0433\u043e \u0432\u043e\u043d\u043e \u0437\u0430\u0437\u0432\u0438\u0447\u0430\u0439 \u0442\u0440\u0438\u0432\u0430\u0454 \u0456 \u0449\u043e \u0437\u043c\u0443\u0448\u0443\u0454 \u0439\u043e\u0433\u043e \u0437\u043d\u0438\u043a\u043d\u0443\u0442\u0438?", "lang": "uk"}, {"role": "Patient", "text": "\u0412\u043e\u043d\u043e \u0437'\u044f\u0432\u043b\u044f\u0454\u0442\u044c\u0441\u044f, \u043a\u043e\u043b\u0438 \u044f \u043f\u0456\u0434\u043d\u0456\u043c\u0430\u044e\u0441\u044f \u0441\u0445\u043e\u0434\u0430\u043c\u0438, \u0456 \u0442\u0440\u0438\u0432\u0430\u0454 \u0431\u043b\u0438\u0437\u044c\u043a\u043e 5 \u0445\u0432\u0438\u043b\u0438\u043d. \u041a\u043e\u043b\u0438 \u044f \u0441\u0456\u0434\u0430\u044e \u0432\u0456\u0434\u043f\u043e\u0447\u0438\u0442\u0438, \u0432\u043e\u043d\u043e \u043c\u0438\u043d\u0430\u0454.", "lang": "uk"}, {"role": "Interpreter", "text": "It happens when I climb the stairs and lasts about 5 minutes. When I sit down to rest, it goes away.", "lang": "en"}, {"role": "Doctor", "text": "This sounds like stable angina, which means your heart muscle isn't getting enough oxygen-rich blood during exertion. I am prescribing Nitroglycerin tablets.", "lang": "en"}, {"role": "Interpreter", "text": "\u0426\u0435 \u0441\u0445\u043e\u0436\u0435 \u043d\u0430 \u0441\u0442\u0430\u0431\u0456\u043b\u044c\u043d\u0443 \u0441\u0442\u0435\u043d\u043e\u043a\u0430\u0440\u0434\u0456\u044e, \u0449\u043e \u043e\u0437\u043d\u0430\u0447\u0430\u0454, \u0449\u043e \u0432\u0430\u0448 \u0441\u0435\u0440\u0446\u0435\u0432\u0438\u0439 \u043c'\u044f\u0437 \u043d\u0435 \u043e\u0442\u0440\u0438\u043c\u0443\u0454 \u0434\u043e\u0441\u0442\u0430\u0442\u043d\u044c\u043e \u0431\u0430\u0433\u0430\u0442\u043e\u0457 \u043d\u0430 \u043a\u0438\u0441\u0435\u043d\u044c \u043a\u0440\u043e\u0432\u0456 \u043f\u0456\u0434 \u0447\u0430\u0441 \u0444\u0456\u0437\u0438\u0447\u043d\u043e\u0433\u043e \u043d\u0430\u0432\u0430\u043d\u0442\u0430\u0436\u0435\u043d\u043d\u044f. \u042f \u0432\u0438\u043f\u0438\u0441\u0443\u044e \u0432\u0430\u043c \u0442\u0430\u0431\u043b\u0435\u0442\u043a\u0438 \u043d\u0456\u0442\u0440\u043e\u0433\u043b\u0456\u0446\u0435\u0440\u0438\u043d\u0443.", "lang": "uk"}, {"role": "Patient", "text": "\u042f\u043a \u0457\u0445 \u043f\u0440\u0438\u0439\u043c\u0430\u0442\u0438? \u041f\u0440\u043e\u0441\u0442\u043e \u043a\u043e\u0432\u0442\u0430\u0442\u0438 \u0437 \u0432\u043e\u0434\u043e\u044e?", "lang": "uk"}, {"role": "Interpreter", "text": "How do I take them? Just swallow with water?", "lang": "en"}, {"role": "Doctor", "text": "No, you must place the tablet under your tongue and let it dissolve at the first sign of chest pain. Do not swallow or chew it.", "lang": "en"}, {"role": "Interpreter", "text": "\u041d\u0456, \u0432\u0438 \u043f\u043e\u0432\u0438\u043d\u043d\u0456 \u043f\u043e\u043a\u043b\u0430\u0441\u0442\u0438 \u0442\u0430\u0431\u043b\u0435\u0442\u043a\u0443 \u043f\u0456\u0434 \u044f\u0437\u0438\u043a \u0456 \u0434\u0430\u0442\u0438 \u0457\u0439 \u0440\u043e\u0437\u0447\u0438\u043d\u0438\u0442\u0438\u0441\u044f \u043f\u0440\u0438 \u043f\u0435\u0440\u0448\u0438\u0445 \u043e\u0437\u043d\u0430\u043a\u0430\u0445 \u0431\u043e\u043b\u044e \u0432 \u0433\u0440\u0443\u0434\u044f\u0445. \u041d\u0435 \u043a\u043e\u0432\u0442\u0430\u0439\u0442\u0435 \u0456 \u043d\u0435 \u0436\u0443\u0439\u0442\u0435 \u0457\u0457.", "lang": "uk"}]}, {"title": "Heart Failure Exacerbation", "topic": "HEART ISSUES", "messages": [{"role": "Doctor", "text": "I see you've gained 8 pounds in the last week, and your ankles are very swollen. Are you having trouble breathing when you lie down flat?", "lang": "en"}, {"role": "Interpreter", "text": "\u042f \u0431\u0430\u0447\u0443, \u0449\u043e \u0432\u0438 \u043d\u0430\u0431\u0440\u0430\u043b\u0438 8 \u0444\u0443\u043d\u0442\u0456\u0432 \u0437\u0430 \u043e\u0441\u0442\u0430\u043d\u043d\u0456\u0439 \u0442\u0438\u0436\u0434\u0435\u043d\u044c, \u0456 \u0432\u0430\u0448\u0456 \u0449\u0438\u043a\u043e\u043b\u043e\u0442\u043a\u0438 \u0434\u0443\u0436\u0435 \u043d\u0430\u0431\u0440\u044f\u043a\u043b\u0438. \u0427\u0438 \u0432\u0430\u0436\u043a\u043e \u0432\u0430\u043c \u0434\u0438\u0445\u0430\u0442\u0438, \u043a\u043e\u043b\u0438 \u0432\u0438 \u043b\u0435\u0436\u0438\u0442\u0435 \u0440\u0456\u0432\u043d\u043e?", "lang": "uk"}, {"role": "Patient", "text": "\u0422\u0430\u043a, \u043c\u0435\u043d\u0456 \u0434\u043e\u0432\u043e\u0434\u0438\u0442\u044c\u0441\u044f \u0441\u043f\u0430\u0442\u0438 \u043d\u0430 \u0442\u0440\u044c\u043e\u0445 \u043f\u043e\u0434\u0443\u0448\u043a\u0430\u0445, \u0456\u043d\u0430\u043a\u0448\u0435 \u044f \u043f\u043e\u0447\u0438\u043d\u0430\u044e \u0437\u0430\u0434\u0438\u0445\u0430\u0442\u0438\u0441\u044f \u0456 \u043a\u0430\u0448\u043b\u044f\u0442\u0438.", "lang": "uk"}, {"role": "Interpreter", "text": "Yes, I have to sleep on three pillows, otherwise I start gasping for air and coughing.", "lang": "en"}, {"role": "Doctor", "text": "This means fluid is backing up into your lungs because your heart isn't pumping effectively. It's an exacerbation of your congestive heart failure.", "lang": "en"}, {"role": "Interpreter", "text": "\u0426\u0435 \u043e\u0437\u043d\u0430\u0447\u0430\u0454, \u0449\u043e \u0440\u0456\u0434\u0438\u043d\u0430 \u043d\u0430\u043a\u043e\u043f\u0438\u0447\u0443\u0454\u0442\u044c\u0441\u044f \u0443 \u0432\u0430\u0448\u0438\u0445 \u043b\u0435\u0433\u0435\u043d\u044f\u0445, \u043e\u0441\u043a\u0456\u043b\u044c\u043a\u0438 \u0432\u0430\u0448\u0435 \u0441\u0435\u0440\u0446\u0435 \u043d\u0435 \u043f\u0435\u0440\u0435\u043a\u0430\u0447\u0443\u0454 \u043a\u0440\u043e\u0432 \u0435\u0444\u0435\u043a\u0442\u0438\u0432\u043d\u043e. \u0426\u0435 \u0437\u0430\u0433\u043e\u0441\u0442\u0440\u0435\u043d\u043d\u044f \u0432\u0430\u0448\u043e\u0457 \u0437\u0430\u0441\u0442\u0456\u0439\u043d\u043e\u0457 \u0441\u0435\u0440\u0446\u0435\u0432\u043e\u0457 \u043d\u0435\u0434\u043e\u0441\u0442\u0430\u0442\u043d\u043e\u0441\u0442\u0456.", "lang": "uk"}, {"role": "Patient", "text": "\u042f \u043d\u0430\u043c\u0430\u0433\u0430\u0432\u0441\u044f \u043f\u0438\u0442\u0438 \u0431\u0456\u043b\u044c\u0448\u0435 \u0432\u043e\u0434\u0438, \u0449\u043e\u0431 \u0432\u0438\u043c\u0438\u0442\u0438 \u043d\u0430\u0431\u0440\u044f\u043a \u0437 \u043d\u0456\u0433. \u0426\u0435 \u043d\u0435 \u0434\u043e\u043f\u043e\u043c\u043e\u0433\u043b\u043e?", "lang": "uk"}, {"role": "Interpreter", "text": "I tried to drink more water to flush the swelling out of my legs. Did that not help?", "lang": "en"}, {"role": "Doctor", "text": "Actually, drinking more fluid makes it worse. We need to restrict your fluid intake and double your Lasix (diuretic) dose for the next few days to help your kidneys eliminate the excess fluid.", "lang": "en"}, {"role": "Interpreter", "text": "\u041d\u0430\u0441\u043f\u0440\u0430\u0432\u0434\u0456, \u0432\u0436\u0438\u0432\u0430\u043d\u043d\u044f \u0431\u0456\u043b\u044c\u0448\u043e\u0457 \u043a\u0456\u043b\u044c\u043a\u043e\u0441\u0442\u0456 \u0440\u0456\u0434\u0438\u043d\u0438 \u0440\u043e\u0431\u0438\u0442\u044c \u0442\u0456\u043b\u044c\u043a\u0438 \u0433\u0456\u0440\u0448\u0435. \u041d\u0430\u043c \u043f\u043e\u0442\u0440\u0456\u0431\u043d\u043e \u043e\u0431\u043c\u0435\u0436\u0438\u0442\u0438 \u0441\u043f\u043e\u0436\u0438\u0432\u0430\u043d\u043d\u044f \u0440\u0456\u0434\u0438\u043d\u0438 \u0442\u0430 \u043f\u043e\u0434\u0432\u043e\u0457\u0442\u0438 \u0434\u043e\u0437\u0443 \u041b\u0430\u0437\u0438\u043a\u0441\u0443 (\u0441\u0435\u0447\u043e\u0433\u0456\u043d\u043d\u043e\u0433\u043e) \u043d\u0430 \u043d\u0430\u0441\u0442\u0443\u043f\u043d\u0456 \u043a\u0456\u043b\u044c\u043a\u0430 \u0434\u043d\u0456\u0432, \u0449\u043e\u0431 \u0434\u043e\u043f\u043e\u043c\u043e\u0433\u0442\u0438 \u0432\u0430\u0448\u0438\u043c \u043d\u0438\u0440\u043a\u0430\u043c \u0432\u0438\u0432\u0435\u0441\u0442\u0438 \u043d\u0430\u0434\u043b\u0438\u0448\u043e\u043a \u0440\u0456\u0434\u0438\u043d\u0438.", "lang": "uk"}]}, {"title": "AFib and Blood Thinners", "topic": "HEART ISSUES", "messages": [{"role": "Doctor", "text": "The Holter monitor results show that your heart goes into an irregular rhythm called Atrial Fibrillation, or AFib.", "lang": "en"}, {"role": "Interpreter", "text": "\u0420\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0438 \u0445\u043e\u043b\u0442\u0435\u0440\u0456\u0432\u0441\u044c\u043a\u043e\u0433\u043e \u043c\u043e\u043d\u0456\u0442\u043e\u0440\u0438\u043d\u0433\u0443 \u043f\u043e\u043a\u0430\u0437\u0443\u044e\u0442\u044c, \u0449\u043e \u0432\u0430\u0448\u0435 \u0441\u0435\u0440\u0446\u0435 \u043f\u0435\u0440\u0435\u0445\u043e\u0434\u0438\u0442\u044c \u0443 \u043d\u0435\u0440\u0435\u0433\u0443\u043b\u044f\u0440\u043d\u0438\u0439 \u0440\u0438\u0442\u043c, \u044f\u043a\u0438\u0439 \u043d\u0430\u0437\u0438\u0432\u0430\u0454\u0442\u044c\u0441\u044f \u0444\u0456\u0431\u0440\u0438\u043b\u044f\u0446\u0456\u0454\u044e \u043f\u0435\u0440\u0435\u0434\u0441\u0435\u0440\u0434\u044c, \u0430\u0431\u043e \u043c\u0438\u0433\u043e\u0442\u043b\u0438\u0432\u043e\u044e \u0430\u0440\u0438\u0442\u043c\u0456\u0454\u044e.", "lang": "uk"}, {"role": "Patient", "text": "\u041c\u0438\u0433\u043e\u0442\u043b\u0438\u0432\u0430 \u0430\u0440\u0438\u0442\u043c\u0456\u044f? \u0406\u043d\u043e\u0434\u0456 \u044f \u0432\u0456\u0434\u0447\u0443\u0432\u0430\u044e, \u044f\u043a \u0441\u0435\u0440\u0446\u0435 \u0442\u0440\u0456\u043f\u043e\u0447\u0435 \u0432 \u0433\u0440\u0443\u0434\u044f\u0445. \u0426\u0435 \u043d\u0435\u0431\u0435\u0437\u043f\u0435\u0447\u043d\u043e?", "lang": "uk"}, {"role": "Interpreter", "text": "Atrial fibrillation? Sometimes I feel my heart fluttering in my chest. Is that dangerous?", "lang": "en"}, {"role": "Doctor", "text": "The main risk with AFib is that blood can pool in the upper chambers of your heart and form clots. If a clot travels to the brain, it can cause a stroke.", "lang": "en"}, {"role": "Interpreter", "text": "\u041e\u0441\u043d\u043e\u0432\u043d\u0438\u0439 \u0440\u0438\u0437\u0438\u043a \u043f\u0440\u0438 \u0444\u0456\u0431\u0440\u0438\u043b\u044f\u0446\u0456\u0457 \u043f\u0435\u0440\u0435\u0434\u0441\u0435\u0440\u0434\u044c \u043f\u043e\u043b\u044f\u0433\u0430\u0454 \u0432 \u0442\u043e\u043c\u0443, \u0449\u043e \u043a\u0440\u043e\u0432 \u043c\u043e\u0436\u0435 \u043d\u0430\u043a\u043e\u043f\u0438\u0447\u0443\u0432\u0430\u0442\u0438\u0441\u044f \u0443 \u0432\u0435\u0440\u0445\u043d\u0456\u0445 \u043a\u0430\u043c\u0435\u0440\u0430\u0445 \u0432\u0430\u0448\u043e\u0433\u043e \u0441\u0435\u0440\u0446\u044f \u0456 \u0443\u0442\u0432\u043e\u0440\u044e\u0432\u0430\u0442\u0438 \u0442\u0440\u043e\u043c\u0431\u0438. \u042f\u043a\u0449\u043e \u0442\u0440\u043e\u043c\u0431 \u043f\u043e\u0442\u0440\u0430\u043f\u0438\u0442\u044c \u0443 \u043c\u043e\u0437\u043e\u043a, \u0446\u0435 \u043c\u043e\u0436\u0435 \u0441\u043f\u0440\u0438\u0447\u0438\u043d\u0438\u0442\u0438 \u0456\u043d\u0441\u0443\u043b\u044c\u0442.", "lang": "uk"}, {"role": "Patient", "text": "\u0411\u043e\u0436\u0435 \u043c\u0456\u0439, \u044f\u043a \u043d\u0430\u043c \u0446\u044c\u043e\u043c\u0443 \u0437\u0430\u043f\u043e\u0431\u0456\u0433\u0442\u0438?", "lang": "uk"}, {"role": "Interpreter", "text": "Oh my god, how do we prevent this?", "lang": "en"}, {"role": "Doctor", "text": "I am putting you on an anticoagulant, a blood thinner called Eliquis. It's crucial that you take it exactly as prescribed, every single day.", "lang": "en"}, {"role": "Interpreter", "text": "\u042f \u043f\u0440\u0438\u0437\u043d\u0430\u0447\u0430\u044e \u0432\u0430\u043c \u0430\u043d\u0442\u0438\u043a\u043e\u0430\u0433\u0443\u043b\u044f\u043d\u0442, \u043f\u0440\u0435\u043f\u0430\u0440\u0430\u0442 \u0434\u043b\u044f \u0440\u043e\u0437\u0440\u0456\u0434\u0436\u0435\u043d\u043d\u044f \u043a\u0440\u043e\u0432\u0456 \u043f\u0456\u0434 \u043d\u0430\u0437\u0432\u043e\u044e \u0415\u043b\u0456\u043a\u0432\u0456\u0441. \u0414\u0443\u0436\u0435 \u0432\u0430\u0436\u043b\u0438\u0432\u043e, \u0449\u043e\u0431 \u0432\u0438 \u043f\u0440\u0438\u0439\u043c\u0430\u043b\u0438 \u0439\u043e\u0433\u043e \u0442\u043e\u0447\u043d\u043e \u0437\u0430 \u043f\u0440\u0438\u0437\u043d\u0430\u0447\u0435\u043d\u043d\u044f\u043c, \u043a\u043e\u0436\u043d\u043e\u0433\u043e \u0431\u043e\u0436\u043e\u0433\u043e \u0434\u043d\u044f.", "lang": "uk"}]}, {"title": "Neuropathy vs Circulation", "topic": "DIABETES", "messages": [{"role": "Doctor", "text": "During the foot exam, I noticed you have lost sensation to the monofilament test on several toes.", "lang": "en"}, {"role": "Interpreter", "text": "\u041f\u0456\u0434 \u0447\u0430\u0441 \u043e\u0433\u043b\u044f\u0434\u0443 \u0432\u0430\u0448\u0438\u0445 \u0441\u0442\u043e\u043f \u044f \u043f\u043e\u043c\u0456\u0442\u0438\u0432, \u0449\u043e \u0432\u0438 \u0432\u0442\u0440\u0430\u0442\u0438\u043b\u0438 \u0447\u0443\u0442\u043b\u0438\u0432\u0456\u0441\u0442\u044c \u0434\u043e \u0442\u0435\u0441\u0442\u0443 \u0437 \u043c\u043e\u043d\u043e\u0444\u0456\u043b\u0430\u043c\u0435\u043d\u0442\u043e\u043c \u043d\u0430 \u043a\u0456\u043b\u044c\u043a\u043e\u0445 \u043f\u0430\u043b\u044c\u0446\u044f\u0445 \u043d\u0456\u0433.", "lang": "uk"}, {"role": "Patient", "text": "\u0422\u0430\u043a, \u043c\u043e\u0457 \u043d\u043e\u0433\u0438 \u0447\u0430\u0441\u0442\u043e \u0432\u0456\u0434\u0447\u0443\u0432\u0430\u044e\u0442\u044c\u0441\u044f \u044f\u043a \u043e\u043d\u0456\u043c\u0456\u043b\u0456 \u0430\u0431\u043e \u0432 \u043d\u0438\u0445 \u043d\u0430\u0447\u0435 \u043a\u043e\u043b\u044e\u0442\u044c \u0433\u043e\u043b\u043a\u0430\u043c\u0438. \u042f \u0434\u0443\u043c\u0430\u0432, \u0446\u0435 \u043f\u0440\u043e\u0441\u0442\u043e \u043f\u043e\u0433\u0430\u043d\u0438\u0439 \u043a\u0440\u043e\u0432\u043e\u043e\u0431\u0456\u0433 \u0447\u0435\u0440\u0435\u0437 \u0442\u0435, \u0449\u043e \u044f \u0441\u0442\u0430\u0440\u0456\u044e.", "lang": "uk"}, {"role": "Interpreter", "text": "Yes, my feet often feel numb or like needles are pricking them. I thought it was just poor circulation because I'm getting older.", "lang": "en"}, {"role": "Doctor", "text": "This is actually diabetic peripheral neuropathy. High blood sugar levels over time have damaged the tiny nerves in your extremities.", "lang": "en"}, {"role": "Interpreter", "text": "\u041d\u0430\u0441\u043f\u0440\u0430\u0432\u0434\u0456 \u0446\u0435 \u0434\u0456\u0430\u0431\u0435\u0442\u0438\u0447\u043d\u0430 \u043f\u0435\u0440\u0438\u0444\u0435\u0440\u0438\u0447\u043d\u0430 \u043d\u0435\u0439\u0440\u043e\u043f\u0430\u0442\u0456\u044f. \u0412\u0438\u0441\u043e\u043a\u0438\u0439 \u0440\u0456\u0432\u0435\u043d\u044c \u0446\u0443\u043a\u0440\u0443 \u0432 \u043a\u0440\u043e\u0432\u0456 \u0437 \u0447\u0430\u0441\u043e\u043c \u043f\u043e\u0448\u043a\u043e\u0434\u0438\u0432 \u0434\u0440\u0456\u0431\u043d\u0456 \u043d\u0435\u0440\u0432\u0438 \u0443 \u0432\u0430\u0448\u0438\u0445 \u043a\u0456\u043d\u0446\u0456\u0432\u043a\u0430\u0445.", "lang": "uk"}, {"role": "Patient", "text": "\u0427\u0438 \u043c\u043e\u0436\u043d\u0430 \u0446\u0435 \u0432\u0438\u043b\u0456\u043a\u0443\u0432\u0430\u0442\u0438? \u041c\u043e\u044f \u0434\u0440\u0443\u0436\u0438\u043d\u0430 \u0437\u043c\u0443\u0448\u0443\u0454 \u043c\u0435\u043d\u0435 \u043d\u043e\u0441\u0438\u0442\u0438 \u0442\u0435\u043f\u043b\u0456 \u0448\u043a\u0430\u0440\u043f\u0435\u0442\u043a\u0438 \u0432\u043d\u043e\u0447\u0456.", "lang": "uk"}, {"role": "Interpreter", "text": "Can this be cured? My wife makes me wear warm socks at night.", "lang": "en"}, {"role": "Doctor", "text": "We cannot reverse the nerve damage, but we can stop it from getting worse by tightly controlling your A1C. You also need to inspect your feet daily for any cuts, since you won't feel them.", "lang": "en"}, {"role": "Interpreter", "text": "\u041c\u0438 \u043d\u0435 \u043c\u043e\u0436\u0435\u043c\u043e \u043f\u043e\u0432\u0435\u0440\u043d\u0443\u0442\u0438 \u043d\u0430\u0437\u0430\u0434 \u043f\u043e\u0448\u043a\u043e\u0434\u0436\u0435\u043d\u043d\u044f \u043d\u0435\u0440\u0432\u0456\u0432, \u0430\u043b\u0435 \u043c\u0438 \u043c\u043e\u0436\u0435\u043c\u043e \u0437\u0443\u043f\u0438\u043d\u0438\u0442\u0438 \u0439\u043e\u0433\u043e \u043f\u0440\u043e\u0433\u0440\u0435\u0441\u0443\u0432\u0430\u043d\u043d\u044f \u0448\u043b\u044f\u0445\u043e\u043c \u0441\u0443\u0432\u043e\u0440\u043e\u0433\u043e \u043a\u043e\u043d\u0442\u0440\u043e\u043b\u044e \u0432\u0430\u0448\u043e\u0433\u043e \u0440\u0456\u0432\u043d\u044f \u0433\u043b\u0456\u043a\u043e\u0432\u0430\u043d\u043e\u0433\u043e \u0433\u0435\u043c\u043e\u0433\u043b\u043e\u0431\u0456\u043d\u0443. \u0412\u0430\u043c \u0442\u0430\u043a\u043e\u0436 \u043f\u043e\u0442\u0440\u0456\u0431\u043d\u043e \u0449\u043e\u0434\u043d\u044f \u043e\u0433\u043b\u044f\u0434\u0430\u0442\u0438 \u0441\u0432\u043e\u0457 \u0441\u0442\u043e\u043f\u0438 \u043d\u0430 \u043d\u0430\u044f\u0432\u043d\u0456\u0441\u0442\u044c \u043f\u043e\u0440\u0456\u0437\u0456\u0432, \u043e\u0441\u043a\u0456\u043b\u044c\u043a\u0438 \u0432\u0438 \u0457\u0445 \u043d\u0435 \u0432\u0456\u0434\u0447\u0443\u0454\u0442\u0435.", "lang": "uk"}]}, {"title": "Hypoglycemia Management", "topic": "DIABETES", "messages": [{"role": "Doctor", "text": "Looking at your continuous glucose monitor logs, you've had several episodes where your blood sugar dropped below 60 mg/dL in the mid-afternoon.", "lang": "en"}, {"role": "Interpreter", "text": "\u0414\u0438\u0432\u043b\u044f\u0447\u0438\u0441\u044c \u043d\u0430 \u0436\u0443\u0440\u043d\u0430\u043b\u0438 \u0432\u0430\u0448\u043e\u0433\u043e \u0430\u043f\u0430\u0440\u0430\u0442\u0443 \u0431\u0435\u0437\u043f\u0435\u0440\u0435\u0440\u0432\u043d\u043e\u0433\u043e \u043c\u043e\u043d\u0456\u0442\u043e\u0440\u0438\u043d\u0433\u0443 \u0433\u043b\u044e\u043a\u043e\u0437\u0438, \u0443 \u0432\u0430\u0441 \u0431\u0443\u043b\u043e \u043a\u0456\u043b\u044c\u043a\u0430 \u0435\u043f\u0456\u0437\u043e\u0434\u0456\u0432, \u043a\u043e\u043b\u0438 \u0440\u0456\u0432\u0435\u043d\u044c \u0446\u0443\u043a\u0440\u0443 \u0432 \u043a\u0440\u043e\u0432\u0456 \u043f\u0430\u0434\u0430\u0432 \u043d\u0438\u0436\u0447\u0435 60 \u043c\u0433/\u0434\u043b \u0443 \u0434\u0440\u0443\u0433\u0456\u0439 \u043f\u043e\u043b\u043e\u0432\u0438\u043d\u0456 \u0434\u043d\u044f.", "lang": "uk"}, {"role": "Patient", "text": "\u0422\u0430\u043a, \u044f \u043f\u043e\u0447\u0438\u043d\u0430\u044e \u043f\u043e\u0442\u0456\u0442\u0438, \u043c\u043e\u0457 \u0440\u0443\u043a\u0438 \u0442\u0440\u044f\u0441\u0443\u0442\u044c\u0441\u044f, \u0456 \u044f \u0432\u0456\u0434\u0447\u0443\u0432\u0430\u044e \u0441\u0438\u043b\u044c\u043d\u0443 \u0441\u043b\u0430\u0431\u043a\u0456\u0441\u0442\u044c. \u042f \u0437\u0430\u0437\u0432\u0438\u0447\u0430\u0439 \u0437'\u0457\u0434\u0430\u044e \u0432\u0435\u043b\u0438\u043a\u0438\u0439 \u0448\u043c\u0430\u0442\u043e\u043a \u0442\u043e\u0440\u0442\u0430 \u0430\u0431\u043e \u043f\u043b\u0438\u0442\u043a\u0443 \u0448\u043e\u043a\u043e\u043b\u0430\u0434\u0443, \u043a\u043e\u043b\u0438 \u0446\u0435 \u0442\u0440\u0430\u043f\u043b\u044f\u0454\u0442\u044c\u0441\u044f.", "lang": "uk"}, {"role": "Interpreter", "text": "Yes, I start sweati
