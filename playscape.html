ng, my hands shake, and I feel very weak. I usually eat a large piece of cake or a chocolate bar when that happens.", "lang": "en"}, {"role": "Doctor", "text": "Chocolate has fat, which slows down sugar absorption. For hypoglycemia, you should use the 'Rule of 15': eat 15 grams of fast-acting carbs, like 4 ounces of juice or 4 glucose tablets, then wait 15 minutes and recheck.", "lang": "en"}, {"role": "Interpreter", "text": "\u0428\u043e\u043a\u043e\u043b\u0430\u0434 \u043c\u0456\u0441\u0442\u0438\u0442\u044c \u0436\u0438\u0440, \u044f\u043a\u0438\u0439 \u0443\u043f\u043e\u0432\u0456\u043b\u044c\u043d\u044e\u0454 \u0437\u0430\u0441\u0432\u043e\u0454\u043d\u043d\u044f \u0446\u0443\u043a\u0440\u0443. \u041f\u0440\u0438 \u0433\u0456\u043f\u043e\u0433\u043b\u0456\u043a\u0435\u043c\u0456\u0457 \u0432\u0430\u043c \u0441\u043b\u0456\u0434 \u0432\u0438\u043a\u043e\u0440\u0438\u0441\u0442\u043e\u0432\u0443\u0432\u0430\u0442\u0438 \u00ab\u041f\u0440\u0430\u0432\u0438\u043b\u043e 15\u00bb: \u0437'\u0457\u0436\u0442\u0435 15 \u0433\u0440\u0430\u043c\u0456\u0432 \u0448\u0432\u0438\u0434\u043a\u043e\u0437\u0430\u0441\u0432\u043e\u044e\u0432\u0430\u043d\u0438\u0445 \u0432\u0443\u0433\u043b\u0435\u0432\u043e\u0434\u0456\u0432, \u043d\u0430\u043f\u0440\u0438\u043a\u043b\u0430\u0434, 4 \u0443\u043d\u0446\u0456\u0457 \u0441\u043e\u043a\u0443 \u0430\u0431\u043e 4 \u0442\u0430\u0431\u043b\u0435\u0442\u043a\u0438 \u0433\u043b\u044e\u043a\u043e\u0437\u0438, \u043f\u043e\u0442\u0456\u043c \u0437\u0430\u0447\u0435\u043a\u0430\u0439\u0442\u0435 15 \u0445\u0432\u0438\u043b\u0438\u043d \u0456 \u043f\u0435\u0440\u0435\u0432\u0456\u0440\u0442\u0435 \u0437\u043d\u043e\u0432\u0443.", "lang": "uk"}, {"role": "Patient", "text": "\u0414\u043e\u0431\u0440\u0435, \u044f \u043a\u0443\u043f\u043b\u044e \u0442\u0456 \u0442\u0430\u0431\u043b\u0435\u0442\u043a\u0438 \u0433\u043b\u044e\u043a\u043e\u0437\u0438. \u041c\u043e\u0436\u043b\u0438\u0432\u043e, \u043c\u0435\u043d\u0456 \u0432\u0430\u0440\u0442\u043e \u0437\u043c\u0435\u043d\u0448\u0438\u0442\u0438 \u0434\u043e\u0437\u0443 \u0456\u043d\u0441\u0443\u043b\u0456\u043d\u0443 \u043f\u0435\u0440\u0435\u0434 \u043e\u0431\u0456\u0434\u043e\u043c?", "lang": "uk"}, {"role": "Interpreter", "text": "Okay, I will buy those glucose tablets. Maybe I should reduce my insulin dose before lunch?", "lang": "en"}, {"role": "Doctor", "text": "Yes, let's reduce your lunchtime rapid-acting insulin by two units and see if that prevents the afternoon crashes.", "lang": "en"}, {"role": "Interpreter", "text": "\u0422\u0430\u043a, \u0434\u0430\u0432\u0430\u0439\u0442\u0435 \u0437\u043c\u0435\u043d\u0448\u0438\u043c\u043e \u0432\u0430\u0448\u0443 \u0434\u043e\u0437\u0443 \u0456\u043d\u0441\u0443\u043b\u0456\u043d\u0443 \u043a\u043e\u0440\u043e\u0442\u043a\u043e\u0457 \u0434\u0456\u0457 \u043f\u0456\u0434 \u0447\u0430\u0441 \u043e\u0431\u0456\u0434\u0443 \u043d\u0430 \u0434\u0432\u0456 \u043e\u0434\u0438\u043d\u0438\u0446\u0456 \u0456 \u043f\u043e\u0434\u0438\u0432\u0438\u043c\u043e\u0441\u044f, \u0447\u0438 \u0446\u0435 \u0437\u0430\u043f\u043e\u0431\u0456\u0436\u0438\u0442\u044c \u043f\u0456\u0441\u043b\u044f\u043e\u0431\u0456\u0434\u043d\u0456\u043c \u043f\u0430\u0434\u0456\u043d\u043d\u044f\u043c \u0446\u0443\u043a\u0440\u0443.", "lang": "uk"}]}, {"title": "A1C and Kidney Function", "topic": "DIABETES", "messages": [{"role": "Doctor", "text": "Your A1C is down to 7.1%, which is a fantastic improvement from 9% six months ago. You should be very proud of your diet changes.", "lang": "en"}, {"role": "Interpreter", "text": "\u0412\u0430\u0448 \u0433\u043b\u0456\u043a\u043e\u0432\u0430\u043d\u0438\u0439 \u0433\u0435\u043c\u043e\u0433\u043b\u043e\u0431\u0456\u043d \u0437\u043d\u0438\u0437\u0438\u0432\u0441\u044f \u0434\u043e 7,1%, \u0449\u043e \u0454 \u0444\u0430\u043d\u0442\u0430\u0441\u0442\u0438\u0447\u043d\u0438\u043c \u043f\u043e\u043a\u0440\u0430\u0449\u0435\u043d\u043d\u044f\u043c \u043f\u043e\u0440\u0456\u0432\u043d\u044f\u043d\u043e \u0437 9% \u043f\u0456\u0432\u0440\u043e\u043a\u0443 \u0442\u043e\u043c\u0443. \u0412\u0438 \u043f\u043e\u0432\u0438\u043d\u043d\u0456 \u0434\u0443\u0436\u0435 \u043f\u0438\u0448\u0430\u0442\u0438\u0441\u044f \u0441\u0432\u043e\u0457\u043c\u0438 \u0437\u043c\u0456\u043d\u0430\u043c\u0438 \u0432 \u0434\u0456\u0454\u0442\u0456.", "lang": "uk"}, {"role": "Patient", "text": "\u0414\u044f\u043a\u0443\u044e, \u044f \u043f\u043e\u0432\u043d\u0456\u0441\u0442\u044e \u0432\u0456\u0434\u043c\u043e\u0432\u0438\u0432\u0441\u044f \u0432\u0456\u0434 \u0445\u043b\u0456\u0431\u0430 \u0442\u0430 \u043c\u0430\u043a\u0430\u0440\u043e\u043d\u0456\u0432. \u0410\u043b\u0435 \u044f \u0431\u0430\u0447\u0438\u0432 \u0443 \u0441\u0432\u043e\u0454\u043c\u0443 \u0434\u043e\u0434\u0430\u0442\u043a\u0443, \u0449\u043e \u0430\u043d\u0430\u043b\u0456\u0437 \u0441\u0435\u0447\u0456 \u043f\u043e\u043a\u0430\u0437\u0430\u0432 \u044f\u043a\u0456\u0441\u044c \u0432\u0456\u0434\u0445\u0438\u043b\u0435\u043d\u043d\u044f?", "lang": "uk"}, {"role": "Interpreter", "text": "Thank you, I completely gave up bread and pasta. But I saw in my app that the urine test showed some abnormalities?", "lang": "en"}, {"role": "Doctor", "text": "Yes, we found trace amounts of albumin, a protein, in your urine. This is an early sign of diabetic nephropathy, meaning the kidneys are under stress.", "lang": "en"}, {"role": "Interpreter", "text": "\u0422\u0430\u043a, \u043c\u0438 \u0432\u0438\u044f\u0432\u0438\u043b\u0438 \u0441\u043b\u0456\u0434\u0438 \u0430\u043b\u044c\u0431\u0443\u043c\u0456\u043d\u0443, \u0442\u043e\u0431\u0442\u043e \u0431\u0456\u043b\u043a\u0430, \u0443 \u0432\u0430\u0448\u0456\u0439 \u0441\u0435\u0447\u0456. \u0426\u0435 \u0440\u0430\u043d\u043d\u044f \u043e\u0437\u043d\u0430\u043a\u0430 \u0434\u0456\u0430\u0431\u0435\u0442\u0438\u0447\u043d\u043e\u0457 \u043d\u0435\u0444\u0440\u043e\u043f\u0430\u0442\u0456\u0457, \u0449\u043e \u043e\u0437\u043d\u0430\u0447\u0430\u0454, \u0449\u043e \u043d\u0438\u0440\u043a\u0438 \u0437\u0430\u0437\u043d\u0430\u044e\u0442\u044c \u043d\u0430\u0432\u0430\u043d\u0442\u0430\u0436\u0435\u043d\u043d\u044f.", "lang": "uk"}, {"role": "Patient", "text": "\u0427\u0438 \u043e\u0437\u043d\u0430\u0447\u0430\u0454 \u0446\u0435, \u0449\u043e \u043c\u0435\u043d\u0456 \u043f\u043e\u0442\u0440\u0456\u0431\u0435\u043d \u0434\u0456\u0430\u043b\u0456\u0437?", "lang": "uk"}, {"role": "Interpreter", "text": "Does this mean I need dialysis?", "lang": "en"}, {"role": "Doctor", "text": "No, this is very early. We will start you on a low dose of an ACE inhibitor, like Lisinopril, which protects the kidneys from further damage.", "lang": "en"}, {"role": "Interpreter", "text": "\u041d\u0456, \u0446\u0435 \u0434\u0443\u0436\u0435 \u0440\u0430\u043d\u043d\u044f \u0441\u0442\u0430\u0434\u0456\u044f. \u041c\u0438 \u043f\u0440\u0438\u0437\u043d\u0430\u0447\u0438\u043c\u043e \u0432\u0430\u043c \u043d\u0438\u0437\u044c\u043a\u0443 \u0434\u043e\u0437\u0443 \u0456\u043d\u0433\u0456\u0431\u0456\u0442\u043e\u0440\u0430 \u0410\u041f\u0424, \u043d\u0430\u043f\u0440\u0438\u043a\u043b\u0430\u0434 \u041b\u0456\u0437\u0438\u043d\u043e\u043f\u0440\u0438\u043b\u0443, \u044f\u043a\u0438\u0439 \u0437\u0430\u0445\u0438\u0449\u0430\u0454 \u043d\u0438\u0440\u043a\u0438 \u0432\u0456\u0434 \u043f\u043e\u0434\u0430\u043b\u044c\u0448\u043e\u0433\u043e \u043f\u043e\u0448\u043a\u043e\u0434\u0436\u0435\u043d\u043d\u044f.", "lang": "uk"}]}, {"title": "Gestational Diabetes Screening", "topic": "PREGNANCY", "messages": [{"role": "Doctor", "text": "You are 26 weeks pregnant, so today we will be doing your Glucose Challenge Test to check for gestational diabetes.", "lang": "en"}, {"role": "Interpreter", "text": "\u0412\u0438 \u043d\u0430 26-\u043c\u0443 \u0442\u0438\u0436\u043d\u0456 \u0432\u0430\u0433\u0456\u0442\u043d\u043e\u0441\u0442\u0456, \u0442\u043e\u043c\u0443 \u0441\u044c\u043e\u0433\u043e\u0434\u043d\u0456 \u043c\u0438 \u0431\u0443\u0434\u0435\u043c\u043e \u0440\u043e\u0431\u0438\u0442\u0438 \u0442\u0435\u0441\u0442 \u043d\u0430 \u0442\u043e\u043b\u0435\u0440\u0430\u043d\u0442\u043d\u0456\u0441\u0442\u044c \u0434\u043e \u0433\u043b\u044e\u043a\u043e\u0437\u0438, \u0449\u043e\u0431 \u043f\u0435\u0440\u0435\u0432\u0456\u0440\u0438\u0442\u0438 \u043d\u0430\u044f\u0432\u043d\u0456\u0441\u0442\u044c \u0433\u0435\u0441\u0442\u0430\u0446\u0456\u0439\u043d\u043e\u0433\u043e \u0434\u0456\u0430\u0431\u0435\u0442\u0443.", "lang": "uk"}, {"role": "Patient", "text": "\u0426\u0435 \u0442\u043e\u0439 \u0433\u0443\u0441\u0442\u0438\u0439 \u0441\u0438\u0440\u043e\u043f, \u044f\u043a\u0438\u0439 \u044f \u043c\u0430\u044e \u0432\u0438\u043f\u0438\u0442\u0438? \u041c\u043e\u044f \u0441\u0435\u0441\u0442\u0440\u0430 \u043a\u0430\u0437\u0430\u043b\u0430, \u0449\u043e \u0432\u0456\u0434 \u043d\u044c\u043e\u0433\u043e \u0457\u0457 \u0437\u043d\u0443\u0434\u0438\u043b\u043e.", "lang": "uk"}, {"role": "Interpreter", "text": "Is that the thick syrup I have to drink? My sister said it made her throw up.", "lang": "en"}, {"role": "Doctor", "text": "Yes, you have to drink the 50-gram glucose drink within 5 minutes. Then we draw your blood exactly one hour later.", "lang": "en"}, {"role": "Interpreter", "text": "\u0422\u0430\u043a, \u0432\u0438 \u043f\u043e\u0432\u0438\u043d\u043d\u0456 \u0432\u0438\u043f\u0438\u0442\u0438 \u043d\u0430\u043f\u0456\u0439 \u0437 50 \u0433\u0440\u0430\u043c\u0430\u043c\u0438 \u0433\u043b\u044e\u043a\u043e\u0437\u0438 \u043f\u0440\u043e\u0442\u044f\u0433\u043e\u043c 5 \u0445\u0432\u0438\u043b\u0438\u043d. \u041f\u043e\u0442\u0456\u043c \u043c\u0438 \u0432\u0456\u0437\u044c\u043c\u0435\u043c\u043e \u0443 \u0432\u0430\u0441 \u043a\u0440\u043e\u0432 \u0440\u0456\u0432\u043d\u043e \u0447\u0435\u0440\u0435\u0437 \u0433\u043e\u0434\u0438\u043d\u0443.", "lang": "uk"}, {"role": "Patient", "text": "\u0427\u0438 \u043c\u043e\u0436\u0443 \u044f \u043f\u0438\u0442\u0438 \u0432\u043e\u0434\u0443, \u043f\u043e\u043a\u0438 \u0447\u0435\u043a\u0430\u044e \u0446\u0456\u0454\u0457 \u0433\u043e\u0434\u0438\u043d\u0438? \u042f \u0432\u0456\u0434\u0447\u0443\u0432\u0430\u044e \u0442\u0430\u043a\u0443 \u0441\u043f\u0440\u0430\u0433\u0443.", "lang": "uk"}, {"role": "Interpreter", "text": "Can I drink water while I wait for that hour? I feel so thirsty.", "lang": "en"}, {"role": "Doctor", "text": "You can have a few small sips of plain water if you feel nauseous, but do not eat anything or drink any large amounts of liquid, as it can dilute the test results.", "lang": "en"}, {"role": "Interpreter", "text": "\u0412\u0438 \u043c\u043e\u0436\u0435\u0442\u0435 \u0437\u0440\u043e\u0431\u0438\u0442\u0438 \u043a\u0456\u043b\u044c\u043a\u0430 \u043d\u0435\u0432\u0435\u043b\u0438\u043a\u0438\u0445 \u043a\u043e\u0432\u0442\u043a\u0456\u0432 \u0437\u0432\u0438\u0447\u0430\u0439\u043d\u043e\u0457 \u0432\u043e\u0434\u0438, \u044f\u043a\u0449\u043e \u0432\u0456\u0434\u0447\u0443\u0432\u0430\u0454\u0442\u0435 \u043d\u0443\u0434\u043e\u0442\u0443, \u0430\u043b\u0435 \u043d\u0456\u0447\u043e\u0433\u043e \u043d\u0435 \u0457\u0436\u0442\u0435 \u0456 \u043d\u0435 \u043f\u0438\u0439\u0442\u0435 \u0432\u0435\u043b\u0438\u043a\u043e\u0457 \u043a\u0456\u043b\u044c\u043a\u043e\u0441\u0442\u0456 \u0440\u0456\u0434\u0438\u043d\u0438, \u043e\u0441\u043a\u0456\u043b\u044c\u043a\u0438 \u0446\u0435 \u043c\u043e\u0436\u0435 \u0440\u043e\u0437\u0431\u0430\u0432\u0438\u0442\u0438 \u0440\u0435\u0437\u0443\u043b\u044c\u0442\u0430\u0442\u0438 \u0442\u0435\u0441\u0442\u0443.", "lang": "uk"}]}, {"title": "Preeclampsia Warning Signs", "topic": "PREGNANCY", "messages": [{"role": "Doctor", "text": "Your blood pressure is slightly elevated today at 135 over 85, and I noticed some swelling in your hands and face.", "lang": "en"}, {"role": "Interpreter", "text": "\u0412\u0430\u0448 \u0430\u0440\u0442\u0435\u0440\u0456\u0430\u043b\u044c\u043d\u0438\u0439 \u0442\u0438\u0441\u043a \u0441\u044c\u043e\u0433\u043e\u0434\u043d\u0456 \u0442\u0440\u043e\u0445\u0438 \u043f\u0456\u0434\u0432\u0438\u0449\u0435\u043d\u0438\u0439 \u2014 135 \u043d\u0430 85, \u0456 \u044f \u043f\u043e\u043c\u0456\u0442\u0438\u0432 \u0434\u0435\u044f\u043a\u0438\u0439 \u043d\u0430\u0431\u0440\u044f\u043a \u043d\u0430 \u0432\u0430\u0448\u0438\u0445 \u0440\u0443\u043a\u0430\u0445 \u0442\u0430 \u043e\u0431\u043b\u0438\u0447\u0447\u0456.", "lang": "uk"}, {"role": "Patient", "text": "\u041c\u043e\u0457 \u043e\u0431\u0440\u0443\u0447\u043a\u0438 \u0431\u0456\u043b\u044c\u0448\u0435 \u043d\u0435 \u043d\u0430\u043b\u0430\u0437\u044f\u0442\u044c. \u0410\u043b\u0435 \u044f \u0434\u0443\u043c\u0430\u043b\u0430, \u0449\u043e \u043d\u0430\u0431\u0440\u044f\u043a\u0438 \u2014 \u0446\u0435 \u043d\u043e\u0440\u043c\u0430\u043b\u044c\u043d\u043e \u0432 \u0442\u0440\u0435\u0442\u044c\u043e\u043c\u0443 \u0442\u0440\u0438\u043c\u0435\u0441\u0442\u0440\u0456.", "lang": "uk"}, {"role": "Interpreter", "text": "My wedding rings don't fit anymore. But I thought swelling was normal in the third trimester.", "lang": "en"}, {"role": "Doctor", "text": "Mild swelling in the ankles is normal, but sudden swelling in the face and hands combined with elevated blood pressure can be a sign of preeclampsia.", "lang": "en"}, {"role": "Interpreter", "text": "\u041b\u0435\u0433\u043a\u0438\u0439 \u043d\u0430\u0431\u0440\u044f\u043a \u0449\u0438\u043a\u043e\u043b\u043e\u0442\u043e\u043a \u2014 \u0446\u0435 \u043d\u043e\u0440\u043c\u0430\u043b\u044c\u043d\u043e, \u0430\u043b\u0435 \u0440\u0430\u043f\u0442\u043e\u0432\u0438\u0439 \u043d\u0430\u0431\u0440\u044f\u043a \u043e\u0431\u043b\u0438\u0447\u0447\u044f \u0442\u0430 \u0440\u0443\u043a \u0443 \u043f\u043e\u0454\u0434\u043d\u0430\u043d\u043d\u0456 \u0437 \u043f\u0456\u0434\u0432\u0438\u0449\u0435\u043d\u0438\u043c \u0430\u0440\u0442\u0435\u0440\u0456\u0430\u043b\u044c\u043d\u0438\u043c \u0442\u0438\u0441\u043a\u043e\u043c \u043c\u043e\u0436\u0435 \u0431\u0443\u0442\u0438 \u043e\u0437\u043d\u0430\u043a\u043e\u044e \u043f\u0440\u0435\u0435\u043a\u043b\u0430\u043c\u043f\u0441\u0456\u0457.", "lang": "uk"}, {"role": "Patient", "text": "\u0422\u0435\u043f\u0435\u0440 \u044f \u0445\u0432\u0438\u043b\u044e\u044e\u0441\u044f. \u0427\u0438 \u0437\u0430\u0433\u0440\u043e\u0436\u0443\u0454 \u0446\u0435 \u043c\u043e\u0457\u0439 \u0434\u0438\u0442\u0438\u043d\u0456?", "lang": "uk"}, {"role": "Interpreter", "text": "Now I am worried. Is my baby in danger?", "lang": "en"}, {"role": "Doctor", "text": "Right now, your baby's heart rate looks perfect. But I want to run a urine test to check for protein, and I need you to go to triage immediately if you develop a severe headache or blurry vision.", "lang": "en"}, {"role": "Interpreter", "text": "\u041d\u0430\u0440\u0430\u0437\u0456 \u0441\u0435\u0440\u0446\u0435\u0431\u0438\u0442\u0442\u044f \u0432\u0430\u0448\u043e\u0457 \u0434\u0438\u0442\u0438\u043d\u0438 \u0432\u0438\u0433\u043b\u044f\u0434\u0430\u0454 \u0456\u0434\u0435\u0430\u043b\u044c\u043d\u043e. \u0410\u043b\u0435 \u044f \u0445\u043e\u0447\u0443 \u0437\u0440\u043e\u0431\u0438\u0442\u0438 \u0430\u043d\u0430\u043b\u0456\u0437 \u0441\u0435\u0447\u0456, \u0449\u043e\u0431 \u043f\u0435\u0440\u0435\u0432\u0456\u0440\u0438\u0442\u0438 \u043d\u0430\u044f\u0432\u043d\u0456\u0441\u0442\u044c \u0431\u0456\u043b\u043a\u0430, \u0456 \u0432\u0430\u043c \u043f\u043e\u0442\u0440\u0456\u0431\u043d\u043e \u043d\u0435\u0433\u0430\u0439\u043d\u043e \u0437\u0432\u0435\u0440\u043d\u0443\u0442\u0438\u0441\u044f \u0434\u043e \u043f\u0440\u0438\u0439\u043c\u0430\u043b\u044c\u043d\u043e\u0433\u043e \u0432\u0456\u0434\u0434\u0456\u043b\u0435\u043d\u043d\u044f, \u044f\u043a\u0449\u043e \u0443 \u0432\u0430\u0441 \u0437'\u044f\u0432\u0438\u0442\u044c\u0441\u044f \u0441\u0438\u043b\u044c\u043d\u0438\u0439 \u0433\u043e\u043b\u043e\u0432\u043d\u0438\u0439 \u0431\u0456\u043b\u044c \u0430\u0431\u043e \u043f\u043e\u043c\u0443\u0442\u043d\u0456\u043d\u043d\u044f \u0437\u043e\u0440\u0443.", "lang": "uk"}]}];
  
  let currentChat = null;
  let currentStep = 0;

  const chatListEl = document.getElementById('chatList');
  const chatMessagesEl = document.getElementById('chatMessages');
  const topicFilter = document.getElementById('topicFilter');
  const chatHeader = document.getElementById('chatHeader');
  const chatControls = document.getElementById('chatControls');
  const chatTitle = document.getElementById('chatTitle');
  const chatTopic = document.getElementById('chatTopic');
  const btnNext = document.getElementById('btnNext');
  const btnReset = document.getElementById('btnReset');

  function renderList(filter = 'ALL') {
    chatListEl.innerHTML = '';
    chats.forEach((chat, index) => {
      if (filter !== 'ALL' && chat.topic !== filter) return;
      
      const div = document.createElement('div');
      div.className = 'chat-item';
      div.innerHTML = `
        <div class="chat-item-topic">${chat.topic}</div>
        <div class="chat-item-title">${chat.title}</div>
      `;
      div.onclick = () => loadChat(index);
      chatListEl.appendChild(div);
    });
  }

  function loadChat(index) {
    currentChat = chats[index];
    currentStep = 0;
    
    document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
    event.currentTarget.classList.add('active');

    chatHeader.style.display = 'block';
    chatControls.style.display = 'flex';
    
    chatTitle.textContent = currentChat.title;
    chatTopic.textContent = "Topic: " + currentChat.topic;

    chatMessagesEl.innerHTML = '';
    
    currentChat.messages.forEach((msg, i) => {
      const div = document.createElement('div');
      div.className = `message ${msg.role}`;
      div.id = `msg-${i}`;
      div.innerHTML = `
        <div class="message-role">${msg.role}</div>
        <div class="message-text">${msg.text}</div>
      `;
      chatMessagesEl.appendChild(div);
    });
    
    updateButtonState();
  }

  function revealNext() {
    if (!currentChat || currentStep >= currentChat.messages.length) return;
    
    const msgEl = document.getElementById(`msg-${currentStep}`);
    if (msgEl) {
      msgEl.classList.add('visible');
      msgEl.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }
    currentStep++;
    updateButtonState();
  }

  function resetChat() {
    if (!currentChat) return;
    currentStep = 0;
    document.querySelectorAll('.message').forEach(el => el.classList.remove('visible'));
    updateButtonState();
  }

  function updateButtonState() {
    if (currentStep >= currentChat.messages.length) {
      btnNext.textContent = "Scenario Complete";
      btnNext.disabled = true;
      btnNext.style.opacity = '0.5';
    } else {
      btnNext.textContent = "Reveal Next Line (Space)";
      btnNext.disabled = false;
      btnNext.style.opacity = '1';
    }
  }

  topicFilter.addEventListener('change', (e) => {
    renderList(e.target.value);
  });

  btnNext.addEventListener('click', revealNext);
  btnReset.addEventListener('click', resetChat);

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && currentChat) {
      e.preventDefault();
      revealNext();
    }
  });

  // Init
  renderList();
</script>
</body>
</html>
